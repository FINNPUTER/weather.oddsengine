<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Weather Intelligence — OddsEngine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--bg:#04080d;--bg1:#080e16;--bg2:#0c131d;--card:#0e1620;--card2:#111c28;--bdr:#152030;--bdrh:#1e3048;--t1:#d8e2ee;--t2:#607890;--t3:#304060;--blue:#1e90ff;--bluel:#3aa0ff;--blued:rgba(30,144,255,.08);--green:#00d97e;--greend:rgba(0,217,126,.08);--amber:#f5a623;--amberd:rgba(245,166,35,.08);--red:#ff4757;--redd:rgba(255,71,87,.08);--violet:#8b5cf6;--violetd:rgba(139,92,246,.08);--cyan:#06d6a0;--mono:'IBM Plex Mono',monospace;--sans:'Outfit',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--mono);font-size:12px;-webkit-font-smoothing:antialiased}

.layout{display:grid;grid-template-rows:auto auto auto 1fr auto;grid-template-columns:1fr 380px;height:100vh}
.header{grid-column:1/-1;border-bottom:1px solid var(--bdr);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,var(--bg2),var(--bg))}
.ticker{grid-column:1/-1;border-bottom:1px solid var(--bdr);background:var(--bg1);padding:4px 0;overflow:hidden;white-space:nowrap}
.ticker-inner{display:inline-flex;gap:28px;animation:scroll 100s linear infinite}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.stats{grid-column:1/-1;display:flex;border-bottom:1px solid var(--bdr);background:var(--bg1)}
.stat{flex:1;padding:8px 14px;border-right:1px solid var(--bdr)}.stat:last-child{border:none}
.stat-l{font-size:8px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1px}
.stat-v{font-size:15px;font-weight:600;font-family:var(--sans)}

.map-wrap{position:relative;overflow:hidden}
.panel{border-left:1px solid var(--bdr);display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--bg1)}
.tab{flex:1;padding:8px;border:none;background:transparent;color:var(--t3);font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--t2)}.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.panel-body{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}

.footer{grid-column:1/-1;border-top:1px solid var(--bdr);padding:5px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--bg1)}

/* Header */
.logo-mark{width:28px;height:28px;border-radius:6px}
.brand{font-size:13px;font-weight:700;letter-spacing:3px;color:#fff;text-transform:uppercase;font-family:var(--sans)}
.brand span{color:var(--blue)}
.brand-sub{font-size:9px;color:var(--t2);letter-spacing:1px}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* Cards */
.city-card{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:10px 12px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.city-card:hover{border-color:var(--bdrh);background:var(--card2)}
.city-card.rain{border-left:3px solid var(--violet)}
.city-card.edge{border-left:3px solid var(--blue)}
.city-card.bet{border-left:3px solid var(--green)}
.cc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cc-name{font-size:12px;font-weight:600;color:#fff;font-family:var(--sans)}
.cc-temp{font-size:18px;font-weight:800;font-family:var(--sans)}
.cc-meta{display:flex;gap:6px;font-size:9px;color:var(--t2);flex-wrap:wrap;margin-bottom:4px}
.tag{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:600;letter-spacing:.3px}
.tag-rain{background:var(--violetd);color:var(--violet)}
.tag-dry{background:var(--greend);color:var(--green)}
.tag-edge{background:var(--blued);color:var(--bluel)}
.tag-bet{background:var(--greend);color:var(--green)}
.tag-region{background:var(--blued);color:var(--t2);font-size:7px}

/* Rain bars */
.rain-row{display:flex;gap:1px;height:14px;margin:3px 0}
.rain-bar{flex:1;border-radius:1px;min-width:0;position:relative}
.rain-bar:hover::after{content:attr(data-tip);position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bdr);padding:2px 5px;border-radius:3px;font-size:8px;white-space:nowrap;z-index:10;color:var(--t1)}

/* Temp row */
.temp-row{display:flex;gap:1px;height:20px;margin:2px 0;align-items:flex-end}
.temp-fill{flex:1;border-radius:1px 1px 0 0;min-width:0}

.time-labels{display:flex;gap:1px;font-size:7px;color:var(--t3)}
.time-labels span{flex:1;text-align:center}

.verdict{font-size:9px;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:3px}
.v-safe{background:var(--greend);color:var(--green)}
.v-rain{background:var(--violetd);color:var(--violet)}
.v-warn{background:var(--amberd);color:var(--amber)}

.mkt-info{font-size:9px;color:var(--t2);margin-top:3px}

.section-label{font-size:8px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin:12px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--bdr)}

/* Loading */
.loading{text-align:center;padding:30px;color:var(--t2)}

/* Leaflet overrides */
.leaflet-container{background:var(--bg)!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--bluel)!important;border-color:var(--bdr)!important}
.leaflet-control-attribution{display:none!important}

/* Custom markers */
.city-marker{border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:700;font-size:10px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);cursor:pointer;transition:transform .2s}
.city-marker:hover{transform:scale(1.3);z-index:1000!important}
.city-label{font-family:var(--mono);font-size:9px;font-weight:500;color:rgba(255,255,255,.6);white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.9)}

/* Popup */
.city-popup .leaflet-popup-content-wrapper{background:rgba(12,19,29,.96)!important;border:1px solid var(--bdrh)!important;border-radius:8px!important;color:var(--t1)!important;box-shadow:0 8px 32px rgba(0,0,0,.6)!important;backdrop-filter:blur(12px)}
.city-popup .leaflet-popup-tip{background:rgba(12,19,29,.96)!important;border-color:var(--bdrh)!important}
.city-popup .leaflet-popup-content{margin:12px 14px!important;font-family:var(--mono)!important;font-size:11px!important}

/* Perf tab */
.perf-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr)}
.perf-win{color:var(--green)}.perf-loss{color:var(--red)}

.flink{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);text-decoration:none;padding:3px 10px;border:1px solid rgba(30,144,255,.3);border-radius:4px}.flink:hover{background:var(--blued)}

/* Filter buttons */
.filters{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.fbtn{padding:3px 8px;font-size:8px;font-weight:600;letter-spacing:.5px;border:1px solid var(--bdr);background:transparent;color:var(--t2);border-radius:3px;cursor:pointer;font-family:var(--mono);transition:.15s}
.fbtn:hover{border-color:var(--bdrh);color:var(--t1)}.fbtn.on{border-color:var(--blue);color:var(--bluel);background:var(--blued)}

/* Weather layer controls */
.wlayer-panel{position:absolute;top:10px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:2px}
.wlayer-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(14,22,32,.92);border:1px solid var(--bdr);border-radius:6px;color:var(--t2);font-family:var(--mono);font-size:10px;font-weight:500;cursor:pointer;transition:all .15s;backdrop-filter:blur(8px);letter-spacing:.3px;min-width:140px}
.wlayer-btn:hover{border-color:var(--bdrh);color:var(--t1);background:rgba(17,28,40,.95)}
.wlayer-btn.on{border-color:var(--blue);color:var(--bluel);background:rgba(30,144,255,.08)}
.wlayer-btn .wl-icon{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px}
.wlayer-btn .wl-dot{width:6px;height:6px;border-radius:50%;margin-left:auto;opacity:0;transition:.15s}
.wlayer-btn.on .wl-dot{opacity:1}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .panel{height:50vh;border-left:none;border-top:1px solid var(--bdr)}
}
</style>
</head><body>

async function fetchWeather(){
  let done=0;
  for(let i=0;i<CITIES.length;i+=5){
    const batch=CITIES.slice(i,i+5);
    await Promise.all(batch.map(async c=>{
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&hourly=temperature_2m,precipitation,cloud_cover,wind_speed_10m&start_date=${DATE}&end_date=${DATE}&timezone=${encodeURIComponent(c.tz)}`);
        const d=await r.json();const h=d.hourly||{};
        const temps=h.temperature_2m||[],precip=h.precipitation||[],clouds=h.cloud_cover||[],wind=h.wind_speed_10m||[];
        if(!temps.length)return;
        const peak=Math.max(...temps),peakH=temps.indexOf(peak);
        const totalRain=Math.round(precip.reduce((a,b)=>a+b,0)*10)/10;
        const amRain=Math.round(precip.slice(6,12).reduce((a,b)=>a+b,0)*10)/10;
        const pmRain=Math.round(precip.slice(12,18).reduce((a,b)=>a+b,0)*10)/10;
        const peakRain=Math.round(precip.slice(10,16).reduce((a,b)=>a+b,0)*10)/10;
        const pc=clouds.slice(10,16);
        const avgPeakCloud=pc.length?Math.round(pc.reduce((a,b)=>a+b,0)/pc.length):0;
        
        weatherData[c.n]={temps,precip,clouds,wind,peak:Math.round(peak*10)/10,peakH,
          totalRain,amRain,pmRain,peakRain,avgPeakCloud,maxWind:Math.round(Math.max(...wind)*10)/10};
        updateMarker(c.n,peak,totalRain);
      }catch(e){}
      done++;
      document.getElementById('fetch-status').textContent=`Weather: ${done}/${CITIES.length}`;
    }));
  }
}

async function fetchMarkets(){
  let done=0;
  const mo={'03':'march','04':'april'};
  const p=DATE.split('-');
  const datePart=`${mo[p[1]]}-${parseInt(p[2])}-${p[0]}`;
  
  for(const c of CITIES){
    try{
      const slug=`highest-temperature-in-${c.slug}-on-${datePart}`;
      const r=await fetch(`https://gamma-api.polymarket.com/events/slug/${slug}`);
      if(r.status!==200)continue;
      const ev=await r.json();
      let best=null;
      for(const m of(ev.markets||[])){
        try{
          const pr=JSON.parse(m.outcomePrices||'[]');
          const p0=parseFloat(pr[0]);
          if(!best||p0>best.p)best={t:m.groupItemTitle,p:p0};
        }catch(e){}
      }
      if(best)marketData[c.n]={t1:best.t,p1:Math.round(best.p*1000)/10,vol:ev.volume||0};
    }catch(e){}
    done++;
    document.getElementById('fetch-status').textContent=`Markets: ${done}/${CITIES.length}`;
  }
}

function getVerdict(d){
  if(!d)return{text:'NO DATA',cls:'v-warn'};
  if(d.totalRain===0)return{text:'☀ DRY',cls:'v-safe'};
  if(d.peakRain>2)return{text:`🌧 RAIN@PEAK (${d.peakRain}mm)`,cls:'v-rain'};
  if(d.amRain>1&&d.pmRain<.5)return{text:`AM rain → peak safe`,cls:'v-warn'};
  if(d.pmRain>1)return{text:`PM rain (${d.pmRain}mm)`,cls:'v-rain'};
  return{text:`Light (${d.totalRain}mm)`,cls:'v-safe'};
}

function rainColor(mm){
  if(mm===0)return'transparent';
  if(mm<.5)return'rgba(139,92,246,.2)';if(mm<2)return'rgba(139,92,246,.4)';
  if(mm<5)return'rgba(139,92,246,.65)';return'rgba(139,92,246,.85)';
}

  document.getElementById('fetch-status').textContent='Fetching market prices...';
  await fetchMarkets();
  renderPanel();
  document.getElementById('fetch-status').textContent=`${Object.keys(weatherData).length} cities · Live data · Open-Meteo + Polymarket`;
}
init();
</script>
