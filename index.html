<style>
:root{--bg:#04080d;--bg1:#080e16;--bg2:#0c131d;--card:#0e1620;--card2:#111c28;--bdr:#152030;--bdrh:#1e3048;--t1:#ffffff;--t2:#b8ccdb;--t3:#7a9ab5;--blue:#1e90ff;--bluel:#3aa0ff;--blued:rgba(30,144,255,.08);--green:#00d97e;--greend:rgba(0,217,126,.08);--amber:#f5a623;--amberd:rgba(245,166,35,.08);--red:#ff4757;--redd:rgba(255,71,87,.08);--violet:#8b5cf6;--violetd:rgba(139,92,246,.08);--cyan:#06d6a0;--mono:'IBM Plex Mono',monospace;--sans:'Outfit',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--mono);font-size:14px;-webkit-font-smoothing:antialiased}

.layout{display:grid;grid-template-rows:auto auto auto 1fr auto;grid-template-columns:1fr 420px;height:100vh}
.header{grid-column:1/-1;border-bottom:1px solid var(--bdr);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,var(--bg2),var(--bg))}
.ticker{grid-column:1/-1;border-bottom:1px solid var(--bdr);background:var(--bg1);padding:5px 0;overflow:hidden;white-space:nowrap;font-size:13px}
.ticker-inner{display:inline-flex;gap:28px;animation:scroll 100s linear infinite}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.stats{grid-column:1/-1;display:flex;border-bottom:1px solid var(--bdr);background:var(--bg1)}
.stat{flex:1;padding:10px 14px;border-right:1px solid var(--bdr)}.stat:last-child{border:none}
.stat-l{font-size:13px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.stat-v{font-size:18px;font-weight:700;font-family:var(--sans)}

.map-wrap{position:relative;overflow:hidden}
.panel{border-left:1px solid var(--bdr);display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--bg1)}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--t3);font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--t2)}.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.panel-body{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}

.footer{grid-column:1/-1;border-top:1px solid var(--bdr);padding:6px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--bg1)}

/* Header */
.brand{font-size:16px;font-weight:700;letter-spacing:3px;color:#fff;text-transform:uppercase;font-family:var(--sans)}
.brand span{color:var(--blue)}
.brand-sub{font-size:11px;color:var(--t2);letter-spacing:1px}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* Date navigation */
.date-nav{display:flex;align-items:center;gap:3px;background:var(--bg1);border:1px solid var(--bdr);border-radius:6px;padding:4px}
.date-btn{padding:6px 12px;border:none;background:transparent;color:var(--t2);font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;border-radius:4px;transition:.15s;white-space:nowrap}
.date-btn:hover{color:var(--t1);background:var(--bg2)}
.date-btn.on{color:var(--blue);background:var(--blued);font-weight:600}
.date-btn.no-market{opacity:.4}
.date-arrow{padding:6px 10px;border:none;background:transparent;color:var(--t2);font-size:16px;cursor:pointer;border-radius:4px}
.date-arrow:hover{color:var(--t1);background:var(--bg2)}

/* Cards */
.city-card{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.city-card:hover{border-color:var(--bdrh);background:var(--card2)}
.city-card.edge-strong{border-left:3px solid var(--green)}
.city-card.edge-med{border-left:3px solid var(--blue)}
.city-card.edge-rain{border-left:3px solid var(--violet)}
.city-card.edge-none{border-left:3px solid var(--bdr)}
.city-card.has-bet{box-shadow:inset 0 0 0 1px rgba(0,217,126,.15)}
.cc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cc-name{font-size:15px;font-weight:600;color:#fff;font-family:var(--sans)}
.cc-temp{font-size:20px;font-weight:800;font-family:var(--sans)}
.cc-meta{display:flex;gap:6px;font-size:12px;color:var(--t2);flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:3px;font-size:13px;font-weight:600;letter-spacing:.3px}
.tag-rain{background:var(--violetd);color:var(--violet)}
.tag-dry{background:var(--greend);color:var(--green)}
.tag-edge{background:var(--blued);color:var(--bluel)}
.tag-bet{background:var(--greend);color:var(--green)}
.tag-region{background:var(--blued);color:var(--t2);font-size:12px}
.tag-buy{background:rgba(0,217,126,.15);color:var(--green);font-weight:700;letter-spacing:.5px}
.tag-skip{background:var(--bg2);color:var(--t3)}
.tag-lotto{background:rgba(245,166,35,.1);color:var(--amber)}
.tag-verify{background:rgba(245,166,35,.15);color:var(--amber);font-weight:700;letter-spacing:.5px;border:1px dashed var(--amber)}

/* Source comparison */
.src-row{display:flex;gap:4px;font-size:12px;margin:3px 0;align-items:center}
.src-label{width:32px;color:var(--t3);font-weight:600;font-size:13px;letter-spacing:.5px;text-transform:uppercase}
.src-val{color:var(--t1);font-weight:500}
.src-adj{color:var(--amber);font-size:11px}

/* Edge meter */
.edge-meter{height:5px;border-radius:2px;background:var(--bg2);margin:4px 0;overflow:hidden}
.edge-fill{height:100%;border-radius:2px;transition:width .3s}

/* Rain bars */
.rain-row{display:flex;gap:1px;height:14px;margin:2px 0}
.rain-bar{flex:1;border-radius:1px;min-width:0}
.temp-row{display:flex;gap:1px;height:20px;margin:2px 0;align-items:flex-end}
.temp-fill{flex:1;border-radius:1px 1px 0 0;min-width:0}

/* Market row */
.mkt-row{display:flex;gap:3px;flex-wrap:wrap;margin:4px 0}
.mkt-chip{padding:3px 7px;border-radius:3px;font-size:11px;font-weight:500;background:var(--bg2);color:var(--t2);border:1px solid transparent}
.mkt-chip.hot{border-color:var(--green);color:var(--green);background:var(--greend)}
.mkt-chip.warm{border-color:var(--blue);color:var(--bluel);background:var(--blued)}

.section-label{font-size:11px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--bdr);font-weight:600}
.loading{text-align:center;padding:30px;color:var(--t2);font-size:14px}

/* Windy & Leaflet overrides */
.leaflet-container{background:var(--bg)!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--bluel)!important;border-color:var(--bdr)!important}
.leaflet-control-attribution{display:none!important}
#windy{width:100%;height:100%}
#windy .leaflet-top.leaflet-left{left:170px!important}
#bottom{display:none!important}
.progress-bar{display:none!important}
#embed-zoom{z-index:5000!important}
#mobile-ovr-select,#logo,#plugins{display:none!important}
.leaflet-control-container .leaflet-top{z-index:5000!important}

/* Custom markers */
.city-marker{border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:700;font-size:12px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);cursor:pointer;transition:transform .2s}
.city-marker:hover{transform:scale(1.3);z-index:1000!important}
.city-label{font-family:var(--mono);font-size:11px;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.9)}

/* Popup */
.city-popup .leaflet-popup-content-wrapper{background:rgba(12,19,29,.96)!important;border:1px solid var(--bdrh)!important;border-radius:8px!important;color:var(--t1)!important;box-shadow:0 8px 32px rgba(0,0,0,.6)!important;backdrop-filter:blur(12px)}
.city-popup .leaflet-popup-tip{background:rgba(12,19,29,.96)!important;border-color:var(--bdrh)!important}
.city-popup .leaflet-popup-content{margin:14px 16px!important;font-family:var(--mono)!important;font-size:13px!important}

/* Perf tab */
.perf-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr)}

.flink{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);text-decoration:none;padding:4px 12px;border:1px solid rgba(30,144,255,.3);border-radius:4px}.flink:hover{background:var(--blued)}

/* Filter buttons */
.filters{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.fbtn{padding:5px 10px;font-size:11px;font-weight:600;letter-spacing:.5px;border:1px solid var(--bdr);background:transparent;color:var(--t2);border-radius:4px;cursor:pointer;font-family:var(--mono);transition:.15s}
.fbtn:hover{border-color:var(--bdrh);color:var(--t1)}.fbtn.on{border-color:var(--blue);color:var(--bluel);background:var(--blued)}

/* Weather layer controls */
.wlayer-panel{position:absolute;top:10px;left:10px;z-index:10000;display:flex;flex-direction:column;gap:3px;pointer-events:auto}
.wlayer-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(14,22,32,.92);border:1px solid var(--bdr);border-radius:5px;color:var(--t2);font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;backdrop-filter:blur(8px);min-width:150px}
.wlayer-btn:hover{border-color:var(--bdrh);color:var(--t1)}
.wlayer-btn.on{border-color:var(--blue);color:var(--bluel);background:rgba(30,144,255,.08)}
.wlayer-btn .wl-dot{width:6px;height:6px;border-radius:50%;margin-left:auto;opacity:0;transition:.15s}
.wlayer-btn.on .wl-dot{opacity:1}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .panel{height:50vh;border-left:none;border-top:1px solid var(--bdr)}
}
</style>

</div>

const OWM_KEY='e75a83526c2d947cd221d23a0e3e6ad2';

let windyLoaded=false;

function initLeafletFallback(){
  // Load Leaflet CSS dynamically
  const link=document.createElement('link');
  link.rel='stylesheet';link.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(link);
  
  const script=document.createElement('script');
  script.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  script.onload=()=>{
    L=window.L;
    map=L.map('windy',{zoomControl:true,attributionControl:false,minZoom:2,maxZoom:10}).setView([25,20],2.5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
    addCityMarkers();
    document.getElementById('fetch-status').textContent='Map ready (Leaflet fallback)';
  };
  document.head.appendChild(script);
}

function initMap(){
  return new Promise(resolve=>{
    // Try Windy first with 8s timeout
    const timeout=setTimeout(()=>{
      console.warn('Windy timeout — falling back to Leaflet');
      document.getElementById('fetch-status').textContent='Windy timeout, loading Leaflet...';
      initLeafletFallback();
      resolve();
    }, 8000);
    
    try{
      if(typeof windyInit==='undefined'){
        clearTimeout(timeout);
        console.warn('windyInit not found — falling back to Leaflet');
        initLeafletFallback();
        resolve();
        return;
      }
      
      const windyOptions={
        key:WINDY_KEY,
        lat:25,lon:20,zoom:3,
        overlay:'wind',
        verbose:false
      };
      
      windyInit(windyOptions, api=>{
        clearTimeout(timeout);
        const{map:m, store}=api;
        map=m;
        L=window.L;
        windyStore=store;
        windyLoaded=true;
        store.set('darkMode',true);
        addCityMarkers();
        document.getElementById('fetch-status').textContent='Windy loaded';
        resolve(api);
      });
    }catch(e){
      clearTimeout(timeout);
      console.error('Windy error:',e);
      initLeafletFallback();
      resolve();
    }
  });
}

// Layer switching — Windy overlays or OWM tile fallback
const OWM_LAYER_MAP={wind:'wind_new',temp:'temp_new',rain:'precipitation_new',clouds:'clouds_new',pressure:'pressure_new',gust:'wind_new'};

function setWindyOverlay(overlay, btn){
  document.querySelectorAll('.wlayer-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  
  if(windyStore){
    // Windy loaded — use native overlay
    windyStore.set('overlay', overlay);
  } else if(map && L){
    // Leaflet fallback — toggle OWM tile layers
    const owmLayer=OWM_LAYER_MAP[overlay]||'temp_new';
    // Remove all existing OWM layers
    Object.values(owmLayersMap).forEach(l=>{try{map.removeLayer(l)}catch(e){}});
    // Add selected layer
    if(!owmLayersMap[owmLayer]){
      owmLayersMap[owmLayer]=L.tileLayer(`https://tile.openweathermap.org/map/${owmLayer}/{z}/{x}/{y}.png?appid=${OWM_KEY}`,{maxZoom:19,opacity:0.55});
    }
    owmLayersMap[owmLayer].addTo(map);
  }
}

function getDateStr(offset){
  const d=new Date();d.setDate(d.getDate()+offset);
  return d.toISOString().split('T')[0];
}
function formatDateShort(ds){
  const d=new Date(ds+'T12:00:00');
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}
function dateToSlugPart(ds){
  const p=ds.split('-');
  return `${MONTHS[parseInt(p[1])]}-${parseInt(p[2])}-${p[0]}`;
}

function buildDateNav(){
  const nav=document.getElementById('date-nav');

async function fetchGFS(){
  gfsData={};
  let done=0;
  for(let i=0;i<CITIES.length;i+=3){
    const batch=CITIES.slice(i,i+3);
    await Promise.all(batch.map(async c=>{
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/gfs?latitude=${c.lat}&longitude=${c.lon}&hourly=temperature_2m,precipitation,cloud_cover,wind_speed_10m,wind_gusts_10m&start_date=${selectedDate}&end_date=${selectedDate}&timezone=${encodeURIComponent(c.tz)}`);
        if(!r.ok)throw new Error(r.status);
        const d=await r.json();const h=d.hourly||{};
        const temps=h.temperature_2m||[],precip=h.precipitation||[],clouds=h.cloud_cover||[],wind=h.wind_speed_10m||[],gusts=h.wind_gusts_10m||[];
        if(!temps.length)return;
        const peak=Math.max(...temps),peakH=temps.indexOf(peak);
        const totalRain=Math.round(precip.reduce((a,b)=>a+b,0)*10)/10;
        // Rain timing: only 11-16 local matters for peak suppression
        const peakRain=precip.length>=16?Math.round(precip.slice(11,16).reduce((a,b)=>a+b,0)*10)/10:0;
        const amRain=precip.length>=11?Math.round(precip.slice(6,11).reduce((a,b)=>a+b,0)*10)/10:0;
        const pmRain=precip.length>=21?Math.round(precip.slice(16,21).reduce((a,b)=>a+b,0)*10)/10:0;
        const pc=clouds.slice(11,16);
        const avgPeakCloud=pc.length?Math.round(pc.reduce((a,b)=>a+b,0)/pc.length):0;
        const peakGusts=gusts.length>=16?Math.round(Math.max(...gusts.slice(11,16))*10)/10:0;
        // Peak hour temps only (11-16 local)
        const peakHourTemps=temps.slice(11,16);
        const peakHourMax=peakHourTemps.length?Math.max(...peakHourTemps):peak;
        
        const adjPeak=Math.round((peakHourMax+(c.off||0))*10)/10;
        // Rain adjustment ONLY if rain during peak hours
        const rainAdj=peakRain>3?-3:(peakRain>1?-1:0);
        const finalPeak=Math.round((adjPeak+rainAdj)*10)/10;
        
        // Rain timing bar (visual)
        const rainBar=precip.slice(0,24).map(p=>p>2?'█':p>0.5?'▓':p>0.1?'░':'·').join('');
        
        gfsData[c.n]={temps,precip,clouds,wind,gusts,rawPeak:peak,peak:adjPeak,finalPeak,peakH,
          totalRain,amRain,pmRain,peakRain,avgPeakCloud,rainAdj,peakGusts,rainBar,
          peakHourMax:Math.round(peakHourMax*10)/10,
          maxWind:Math.round(Math.max(...wind)*10)/10,offset:c.off||0};
        
        updateMarker(c.n,finalPeak,totalRain,false);
      }catch(e){}
      done++;
      document.getElementById('fetch-status').textContent=`GFS: ${done}/${CITIES.length}`;
    }));
    await new Promise(r=>setTimeout(r,150));
  }
}

async function fetchECMWF(){
  ecmwfData={};
  let done=0;
  for(let i=0;i<CITIES.length;i+=5){
    const batch=CITIES.slice(i,i+5);
    await Promise.all(batch.map(async c=>{
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/ecmwf?latitude=${c.lat}&longitude=${c.lon}&hourly=temperature_2m,precipitation&start_date=${selectedDate}&end_date=${selectedDate}&timezone=${encodeURIComponent(c.tz)}`);
        if(!r.ok)return;
        const d=await r.json();const h=d.hourly||{};
        const temps=(h.temperature_2m||[]).filter(t=>t!==null);
        const precip=(h.precipitation||[]).filter(p=>p!==null);
        if(!temps.length)return;
        const peak=Math.max(...temps);
        const adjPeak=Math.round((peak+(c.off||0))*10)/10;
        // Use GFS rain timing for adjustment
        const gfs=gfsData[c.n];
        const rainAdj=gfs?gfs.rainAdj:0;
        const finalPeak=Math.round((adjPeak+rainAdj)*10)/10;
        ecmwfData[c.n]={rawPeak:peak,peak:adjPeak,finalPeak};
      }catch(e){}
      done++;
    }));
    document.getElementById('fetch-status').textContent=`ECMWF: ${done}/${CITIES.length}`;
    await new Promise(r=>setTimeout(r,200));
  }
}

async function fetchWeatherOWM(){
  owmData={};
  let done=0;
  for(let i=0;i<CITIES.length;i+=5){
    const batch=CITIES.slice(i,i+5);
    await Promise.all(batch.map(async c=>{
      try{
        const r=await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${c.lat}&lon=${c.lon}&units=metric&appid=${OWM_KEY}`);
        const d=await r.json();
        if(!d.list)return;
        // Find entries matching selectedDate
        const dayEntries=d.list.filter(e=>e.dt_txt.startsWith(selectedDate));
        if(!dayEntries.length)return;
        const temps=dayEntries.map(e=>e.main.temp_max);
        const peak=Math.max(...temps);
        const rain=dayEntries.reduce((a,e)=>a+((e.rain&&e.rain['3h'])||0),0);
        const adjPeak=Math.round((peak+(c.off||0))*10)/10;
        owmData[c.n]={peak,adjPeak,rain:Math.round(rain*10)/10,entries:dayEntries.length};
      }catch(e){}
      done++;
      document.getElementById('fetch-status').textContent=`OWM: ${done}/${CITIES.length}`;
    }));
  }
}

async function fetchMarkets(){
  marketData={};
  const slugDate=dateToSlugPart(selectedDate);
  
  // Batch through proxy to avoid CORS
  for(let i=0;i<CITIES.length;i+=10){
    const batch=CITIES.slice(i,i+10);
    const slugs=batch.map(c=>`highest-temperature-in-${c.slug}-on-${slugDate}`).join(',');
    try{
      const r=await fetch(`${PROXY_BASE}/markets-batch?slugs=${encodeURIComponent(slugs)}`);
      if(!r.ok)continue;
      const results=await r.json();
      
      batch.forEach(c=>{
        const slug=`highest-temperature-in-${c.slug}-on-${slugDate}`;
        const ev=results[slug];
        if(!ev)return;
        const mkts=[];
        for(const m of(ev.markets||[])){
          try{
            const pr=JSON.parse(m.outcomePrices||'[]');
            const p0=parseFloat(pr[0]);
            const title=m.groupItemTitle||'';
            mkts.push({title,price:Math.round(p0*1000)/10,raw:p0});
          }catch(e){}
        }
        mkts.sort((a,b)=>b.price-a.price);
        if(mkts.length)marketData[c.n]={markets:mkts,vol:ev.volume||0,hasMarket:true};
      });
    }catch(e){console.error('Batch market fetch error:',e);}
    document.getElementById('fetch-status').textContent=`Markets: ${Math.min(i+10,CITIES.length)}/${CITIES.length}`;
  }
}

async function fetchPositions(){
  // Trade log is the ONLY source of truth
  try{
    const tr=await fetch(PROXY_BASE+'/trades');
    if(!tr.ok)throw new Error('Trades API '+tr.status);
    const tradeLog=await tr.json();
    
    if(tradeLog.trades&&tradeLog.trades.length){
      positionsData=tradeLog.trades.map(t=>({
        city:t.city||'Unknown',temp:t.temp||'?',date:t.date||'',
        cost:t.cost||0,payout:t.payout||0,pnl:t.pnl||0,
        status:t.status||'active',result:t.result||null,
        size:t.size,avgPrice:t.price,curPrice:null,title:'',
        id:t.id||''
      }));
      tradeSummary=tradeLog.summary||{};
      positionsLoaded=true;
      console.log('Trade log loaded:',positionsData.length,'trades, summary:',tradeSummary);
    } else {
      positionsData=[];
      tradeSummary={};
      positionsLoaded=true;
      console.log('Trade log empty');
    }
  }catch(e){
    console.error('Trade log fetch failed:',e.message);
    positionsData=[];
    tradeSummary={};
    positionsLoaded=true;
  }
}

// ═══════════════════════════════════════════
// EDGE DETECTION
// ═══════════════════════════════════════════
function getEdge(cityName){
  const w=gfsData[cityName];
  const ec=ecmwfData[cityName];
  const o=owmData[cityName];
  const mk=marketData[cityName];
  const c=CITIES.find(x=>x.n===cityName);
  if(!w)return null;
  
  const today=getDateStr(0);
  const daysAhead=Math.round((new Date(selectedDate+'T12:00:00')-new Date(today+'T12:00:00'))/(86400000));
  
  // Three sources
  let sources=[{name:'GFS',val:w.finalPeak,raw:w.rawPeak}];
  if(ec)sources.push({name:'ECM',val:ec.finalPeak,raw:ec.rawPeak});
  if(o){
    const owmAdj=Math.round((o.adjPeak+(w.rainAdj||0))*10)/10;
    sources.push({name:'OWM',val:owmAdj,raw:o.peak});
  }
  
  // Consensus = average of all sources
  const vals=sources.map(s=>s.val);
  let ourForecast=Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10;
  const sourceSpread=Math.round((Math.max(...vals)-Math.min(...vals))*10)/10;
  
  const displayTemp=c.u==='F'?Math.round(ourForecast*9/5+32):Math.round(ourForecast);
  const unit=c.u==='F'?'°F':'°C';
  
  let verdict='SKIP',edgeLevel=0,cheapTemps=[],edgeColor='var(--t3)';
  
  // Confidence: more sources agreeing = higher confidence
  let confPenalty=0,confWarning='';
  if(daysAhead>=2){confPenalty=2;confWarning='⚠ 2+ days out — verify';}
  else if(daysAhead>=1){confPenalty=1;confWarning='⚠ Tomorrow — recheck';}
  if(sourceSpread>4){confPenalty=Math.max(confPenalty,2);confWarning=`⚠ Sources spread ${sourceSpread}° — low confidence`;}
  
  if(mk&&mk.hasMarket){
    const consensus=mk.markets[0];
    const nearTemps=mk.markets.filter(m=>{
      const match=m.title.match(/([\d]+)/);
      if(!match)return false;
      return Math.abs(parseInt(match[1])-displayTemp)<=3&&m.price<15;
    });
    cheapTemps=nearTemps;
    
    if(nearTemps.length>0){
      const cheapest=nearTemps.filter(t=>t.price<8);
      if(cheapest.length>0){verdict='BUY';edgeLevel=3;edgeColor='var(--green)';}
      else{verdict='EDGE';edgeLevel=2;edgeColor='var(--blue)';}
    }
    
    const consMatch=consensus.title.match(/([\d]+)/);
    if(consMatch){
      const consTemp=parseInt(consMatch[1]);
      if(Math.abs(consTemp-displayTemp)>=3){
        verdict=verdict==='SKIP'?'EDGE':verdict;
        edgeLevel=Math.max(edgeLevel,2);
      }
    }
  }
  
  // Rain edge — only if rain during PEAK hours (11-16)
  if(w.peakRain>3&&mk&&mk.hasMarket){
    verdict='RAIN 🔴';edgeLevel=2;edgeColor='var(--violet)';
  }else if(w.peakRain>1&&mk&&mk.hasMarket&&w.totalRain>5){
    verdict='RAIN 🟡';edgeLevel=2;edgeColor='var(--violet)';
  }
  
  if(confPenalty>0&&edgeLevel>0){
    edgeLevel=Math.max(0,edgeLevel-confPenalty);
    if(edgeLevel<=1&&verdict!=='SKIP'){verdict='VERIFY';edgeColor='var(--amber)';}
  }
  
  // Rain timing label
  let rainTiming='☀DRY';
  if(w.peakRain>3)rainTiming='🔴PEAK';
  else if(w.peakRain>1)rainTiming='🟡peak';
  else if(w.amRain>3)rainTiming='🌧AM';
  else if(w.pmRain>3)rainTiming='🌧PM';
  else if(w.totalRain>3)rainTiming='🌧spread';
  else if(w.totalRain>0)rainTiming=`🌤${w.totalRain}mm`;
  
  return{ourForecast,displayTemp,unit,sources,verdict,edgeLevel,edgeColor,cheapTemps,
    rain:w.totalRain,peakRain:w.peakRain,rainAdj:w.rainAdj,offset:w.offset,
    hasMarket:!!(mk&&mk.hasMarket),daysAhead,confWarning,sourceSpread,
    rainBar:w.rainBar||'',rainTiming,peakGusts:w.peakGusts||0,avgPeakCloud:w.avgPeakCloud||0,
    nSources:sources.length};
}
}

function rainColor(mm){
  if(mm===0)return'transparent';
  if(mm<.5)return'rgba(139,92,246,.2)';if(mm<2)return'rgba(139,92,246,.4)';
  if(mm<5)return'rgba(139,92,246,.65)';return'rgba(139,92,246,.85)';
}

function renderTicker(){
  let items=CITIES.map(c=>{
    const d=gfsData[c.n];if(!d)return'';
    const u=c.u==='F'?'°F':'°C';
    const display=c.u==='F'?Math.round(d.finalPeak*9/5+32)+u:d.finalPeak+u;
    const rainIcon=d.totalRain>3?`<span style="color:var(--violet)">🌧${d.totalRain}mm</span>`:'';
    const e=getEdge(c.n);
    const edgeIcon=e&&e.edgeLevel>=2?`<span style="color:${e.edgeColor}">⚡</span>`:'';
    return `<span>${edgeIcon}<b style="color:#fff">${c.n}</b> <span style="color:${tempColor(d.finalPeak)}">${display}</span> ${rainIcon}</span>`;
  }).filter(Boolean).join('');
  document.getElementById('ticker').innerHTML=items+items;
}

function renderScanner(el){
  const sorted=CITIES.map(c=>{
    const d=gfsData[c.n];const e=getEdge(c.n);const mk=marketData[c.n];
    return{city:c,data:d,edge:e,mk};
  }).filter(x=>x.data).sort((a,b)=>{
    // Sort: edges first, then by edge level, then rain
    const ea=a.edge?a.edge.edgeLevel:0;
    const eb=b.edge?b.edge.edgeLevel:0;
    if(ea!==eb)return eb-ea;
    return(b.data.peakRain||0)-(a.data.peakRain||0);
  });

  // Filters
  let html=`<div class="filters">
    <button class="fbtn ${currentFilter==='all'?'on':''}" onclick="setFilter('all')">All</button>
    <button class="fbtn ${currentFilter==='edge'?'on':''}" onclick="setFilter('edge')">⚡ Edge</button>
    <button class="fbtn ${currentFilter==='rain'?'on':''}" onclick="setFilter('rain')">🌧 Rain</button>
    <button class="fbtn ${currentFilter==='dry'?'on':''}" onclick="setFilter('dry')">☀ Dry</button>
    <button class="fbtn ${currentFilter==='market'?'on':''}" onclick="setFilter('market')">📊 Markets</button>
  </div>`;

  let filtered=sorted;
  if(currentFilter==='edge')filtered=sorted.filter(x=>x.edge&&x.edge.edgeLevel>=2);
  if(currentFilter==='rain')filtered=sorted.filter(x=>x.data.totalRain>3);
  if(currentFilter==='dry')filtered=sorted.filter(x=>x.data.totalRain===0);
  if(currentFilter==='market')filtered=sorted.filter(x=>x.mk&&x.mk.hasMarket);

  if(filtered.some(x=>x.edge&&x.edge.edgeLevel>=2)){
    html+=`<div class="section-label">⚡ EDGE DETECTED</div>`;
  }

  filtered.forEach(x=>{
    const{city:c,data:d,edge:e,mk}=x;
    if(!e)return;
    const u=c.u==='F'?'°F':'°C';
    const display=`${e.displayTemp}${u}`;
    const cardClass=e.edgeLevel>=3?'edge-strong':e.edgeLevel>=2?'edge-med':e.verdict.includes('RAIN')?'edge-rain':'edge-none';
    
    html+=`<div class="city-card ${cardClass}" onclick="flyTo('${c.n}')">
      <div class="cc-head">
        <span class="cc-name">${c.n} <span class="tag tag-region">${c.r}</span></span>
        <span style="font-size:18px;font-weight:800;color:${tempColor(e.ourForecast)};font-family:var(--sans)">${display}</span>
      </div>
      <div class="cc-meta">
        ${e.sources.map(s=>`<span>${s.name}: ${Math.round(s.val*10)/10}°C</span>`).join('')}
        ${IS_PRIVATE&&e.offset?`<span class="src-adj">✈${e.offset>0?'+':''}${e.offset}°C</span>`:''}
        ${IS_PRIVATE&&e.rainAdj?`<span class="src-adj">🌧${e.rainAdj}°C</span>`:''}
        ${d.totalRain>0?`<span class="tag tag-rain">${e.rainTiming} ${d.totalRain}mm</span>`:'<span class="tag tag-dry">DRY</span>'}
      </div>
      ${e.rainBar&&d.totalRain>1?`<div style="font-family:var(--mono);font-size:10px;color:var(--t3);margin:2px 0;letter-spacing:1px" title="Rain: 0h→23h, █>2mm ▓>0.5mm ░>0.1mm">🌧${e.rainBar}<span style="color:var(--t2);margin-left:4px">${e.peakRain>0?'pk:'+e.peakRain+'mm':''}</span></div>`:''}`;
    
    // Market prices + edge
    if(mk&&mk.hasMarket){
      html+=`<div class="mkt-row">`;
      mk.markets.slice(0,8).forEach(m=>{
        const isNear=e.cheapTemps.some(ct=>ct.title===m.title);
        html+=`<span class="mkt-chip ${isNear&&m.price<8?'hot':isNear?'warm':''}">${m.title} ${m.price}%</span>`;
      });
      html+=`</div>`;
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">
        <span class="tag tag-${e.verdict==='BUY'?'buy':e.verdict==='VERIFY'?'verify':e.verdict==='SKIP'?'skip':e.verdict.includes('EDGE')?'edge':'lotto'}">${e.verdict}</span>
        ${e.cheapTemps.length?`<span style="font-size:11px;color:var(--green)">${e.cheapTemps.length} cheap near forecast</span>`:''}
      </div>`;
      if(e.confWarning){html+=`<div style="font-size:10px;color:var(--amber);margin-top:3px">${e.confWarning}</div>`}
    } else {
      html+=`<div style="font-size:12px;color:var(--t3);margin-top:2px">No market yet</div>`;
    }
    
    html+=`</div>`;
  });

  if(!filtered.length)html+='<div style="font-size:13px;color:var(--t2);padding:10px">No cities match filter</div>';
  
  if(!IS_PRIVATE){
    html+=`<div style="margin-top:14px;padding:16px;background:linear-gradient(135deg,rgba(30,144,255,.08),rgba(139,92,246,.08));border:1px solid rgba(30,144,255,.2);border-radius:8px;text-align:center">
      <div style="font-size:14px;font-weight:700;color:#fff;font-family:var(--sans);margin-bottom:6px">Get Real-Time Trading Signals</div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:10px">Automated edge detection across 35 cities. Multi-source weather intelligence.</div>
      <a href="https://oddsengine.live" style="display:inline-block;padding:8px 24px;background:var(--blue);color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;border-radius:6px;text-decoration:none">Learn More →</a>
    </div>`;
  }
  el.innerHTML=html;
}

  if(!active.length)html+='<div style="font-size:13px;color:var(--t2);padding:8px">No active positions</div>';

    html+=`<div class="city-card has-bet">
      <div class="cc-head"><span class="cc-name">${city}</span><span style="font-size:11px;color:var(--green);font-weight:600">$${totalCost.toFixed(2)}</span></div>

  const resolved=positionsData.filter(p=>p.status==='resolved');
  html+=`<div style="margin-top:10px;padding:10px;background:var(--card);border:1px solid var(--bdr);border-radius:6px">

function renderPerf(el){
  if(!positionsLoaded){el.innerHTML='<div class="loading">Fetching performance...</div>';return;}
  const resolved=positionsData.filter(p=>p.status==='resolved');
  const active=positionsData.filter(p=>p.status==='active');
  const wins=resolved.filter(p=>p.pnl>0);
  const totalPnl=resolved.reduce((a,b)=>a+b.pnl,0);
  const resolvedInv=resolved.reduce((a,b)=>a+b.cost,0);
  const activeInv=active.reduce((a,b)=>a+b.cost,0);
  const roi=resolvedInv>0?((totalPnl/resolvedInv)*100):0;
  const pnlColor=totalPnl>=0?'var(--green)':'var(--red)';
  
  let html=`<div style="padding:12px;background:${totalPnl>=0?'var(--greend)':'var(--redd)'};border:1px solid ${totalPnl>=0?'rgba(0,217,126,.2)':'rgba(255,71,87,.2)'};border-radius:6px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:12px;color:${pnlColor};letter-spacing:1px">NET P&L (RESOLVED)</div>
      <div style="font-size:28px;font-weight:800;color:${pnlColor};font-family:var(--sans)">${totalPnl>=0?'+':''}$${Math.abs(totalPnl).toFixed(2)}</div></div>
      <div style="text-align:right"><div style="font-size:13px;color:var(--t2)">$${resolvedInv.toFixed(2)} resolved</div>
      <div style="font-size:16px;font-weight:700;color:var(--bluel);font-family:var(--sans)">${roi>=0?'+':''}${roi.toFixed(0)}% ROI</div>
      <div style="font-size:12px;color:var(--t2)">${wins.length}W / ${resolved.length-wins.length}L · $${activeInv.toFixed(2)} active</div></div>
    </div></div>`;
  
  html+='<div class="section-label">TRADE HISTORY</div>';
  [...resolved].reverse().forEach(t=>{
    const w=t.pnl>0;
    html+=`<div class="perf-row">
      <div><div style="font-size:13px;font-weight:600;color:${w?'var(--green)':'var(--red)'}">${t.city} ${t.temp}</div>
      <div style="font-size:11px;color:var(--t3)">${t.date} · $${t.cost.toFixed(2)} → $${t.payout.toFixed(2)}</div></div>
      <div style="font-size:13px;font-weight:700;color:${w?'var(--green)':'var(--red)'};font-family:var(--sans)">${t.pnl>=0?'+':''}$${t.pnl.toFixed(2)}</div>
    </div>`;
  });
  if(!resolved.length)html+='<div style="font-size:13px;color:var(--t2);padding:8px">No resolved trades yet</div>';
  el.innerHTML=html;
}

function selectCity(name){
  const d=gfsData[name];if(!d)return;
  const c=CITIES.find(x=>x.n===name);
  const e=getEdge(name);
  const mk=marketData[name];
  const u=c.u==='F'?'°F':'°C';
  
  let html=`<div style="font-size:15px;font-weight:700;color:#fff;font-family:var(--sans)">${name}</div>
    <div style="font-size:12px;color:var(--t2);margin:2px 0">${IS_PRIVATE?c.icao+' · ':''}${c.r} · ${formatDateShort(selectedDate)}</div>`;
  
  if(e){
    html+=`<div style="font-size:24px;font-weight:800;color:${tempColor(e.ourForecast)};font-family:var(--sans);margin:4px 0">${e.displayTemp}${u}</div>`;
    // Sources
    html+=`<div style="font-size:12px;color:var(--t2)">`;
    e.sources.forEach(s=>{html+=`${s.name}: ${Math.round(s.val*10)/10}°C · `;});
    html+=`Rain: ${d.totalRain}mm ${e.rainTiming||''}`;
    if(IS_PRIVATE&&e.offset)html+=` · ✈${e.offset>0?'+':''}${e.offset}°C`;
    if(IS_PRIVATE&&e.rainAdj)html+=` · 🌧${e.rainAdj}°C`;
    html+=`</div>`;
    if(e.rainBar&&d.totalRain>1){
      html+=`<div style="font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:1px;margin:2px 0" title="Rain 0-23h">🌧${e.rainBar} <span style="color:var(--amber)">pk:${d.peakRain}mm</span></div>`;
    }
    
    if(e.hasMarket){
      html+=`<div style="margin-top:4px"><span class="tag tag-${e.verdict==='BUY'?'buy':e.verdict==='VERIFY'?'verify':e.verdict==='SKIP'?'skip':e.verdict.includes('EDGE')?'edge':'lotto'}">${e.verdict}</span></div>`;
      if(e.confWarning){html+=`<div style="font-size:10px;color:var(--amber);margin-top:3px">${e.confWarning}</div>`}
      if(e.cheapTemps.length){
        html+=`<div style="font-size:11px;color:var(--green);margin-top:4px">Cheap near forecast:</div>`;
        e.cheapTemps.forEach(t=>{
          html+=`<div style="font-size:12px;color:var(--t1)">${t.title} @${t.price}%</div>`;
        });
      }
    } else {
      html+=`<div style="font-size:12px;color:var(--t3);margin-top:4px">No market for this date</div>`;
    }
  }
  
  // Show user's positions for this city — private only, date-matched
  if(IS_PRIVATE){
    // Convert selectedDate "2026-03-29" to "March 29" format
    const sp=selectedDate.split('-');
    const selMonth=Object.values(MONTHS)[parseInt(sp[1])-1];
    const selDateStr=selMonth.charAt(0).toUpperCase()+selMonth.slice(1)+' '+parseInt(sp[2]);
    
    const myPos=positionsData.filter(p=>{
      const cityMatch=p.city.toLowerCase().includes(name.toLowerCase());
      const dateMatch=p.date&&p.date.toLowerCase()===selDateStr.toLowerCase();
      return cityMatch&&dateMatch;
    });
    if(myPos.length){
      const active=myPos.filter(p=>p.status==='active');
      if(active.length){
        html+=`<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr);font-size:11px;color:var(--green);letter-spacing:1px">YOUR POSITIONS</div>`;
        active.forEach(p=>{
          html+=`<div style="font-size:12px;display:flex;justify-content:space-between"><span>${p.temp}</span><span style="color:var(--t2)">$${p.cost.toFixed(2)}</span></div>`;
        });
      }
    }
  }
  
  L.popup({className:'city-popup',maxWidth:280}).setLatLng([c.lat,c.lon]).setContent(html).openOn(map);
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
  renderPanel();
}

function flyTo(name){
  const c=CITIES.find(x=>x.n===name);
  if(c)map.flyTo([c.lat,c.lon],6,{duration:1});
  selectCity(name);
}

async function loadAllData(){
  document.getElementById('panel-content').innerHTML='<div class="loading">Scanning '+formatDateShort(selectedDate)+' — GFS + ECMWF + OWM...</div>';
  
  await fetchGFS();
  renderTicker();
  renderStats();
  renderPanel();
  
  document.getElementById('fetch-status').textContent='Fetching ECMWF + OWM...';
  await Promise.all([fetchECMWF(), fetchWeatherOWM()]);
  
  CITIES.forEach(c=>{
    const d=gfsData[c.n];const e=getEdge(c.n);
    if(d)updateMarker(c.n,d.finalPeak,d.totalRain,e&&e.edgeLevel>=2);
  });
  renderPanel();
  
  document.getElementById('fetch-status').textContent='Fetching Polymarket prices...';
  await fetchMarkets();
  
  CITIES.forEach(c=>{
    const d=gfsData[c.n];const e=getEdge(c.n);
    if(d)updateMarker(c.n,d.finalPeak,d.totalRain,e&&e.edgeLevel>=2);
  });
  renderStats();renderPanel();
  
  const edges=CITIES.map(c=>getEdge(c.n)).filter(e=>e&&e.edgeLevel>=2).length;
  const tradeInfo=positionsLoaded?` · ${positionsData.length} trades`:'';
  const srcInfo=`GFS:${Object.keys(gfsData).length} ECM:${Object.keys(ecmwfData).length} OWM:${Object.keys(owmData).length}`;
  document.getElementById('fetch-status').textContent=`${srcInfo} · ${Object.keys(marketData).length} markets · ${edges} edges${tradeInfo} · ${formatDateShort(selectedDate)}`;
}

  buildTabs();
  
  // Mode-dependent UI
  if(!IS_PRIVATE){
    document.querySelector('.brand-sub').textContent='Weather Intelligence · Algorithmic Edge Detection';
    document.querySelector('.flink').textContent='Get Access →';
  }
  
  document.getElementById('fetch-status').textContent='Initializing map...';
  await initMap();
  
  // Fetch trade log for ROI/stats (both modes)
  fetchPositions().then(()=>{renderStats();renderPanel();});
  
  await loadAllData();
}
init();
</script>
