    <script>

 const calcLP=(date)=>{
 const[y,m,d]=date.split('-').map(Number);
 let t=(d+''+m+''+y).split('').reduce((a,b)=>a+parseInt(b),0);
 if([11,22,33].includes(t))return{num:t,master:true};
 while(t>9&&![11,22,33].includes(t)){t=String(t).split('').reduce((a,b)=>a+parseInt(b),0);if([11,22,33].includes(t))return{num:t,master:true}}
 return{num:t,master:false}
 };

 const getMoonPhase=(lang='de')=>{
 const now=new Date();
 const lp=2551443;
 const newMoon=new Date(1970,0,7,20,35,0);
 const diff=(now.getTime()-newMoon.getTime())/1000;
 const phase=((diff%lp)/lp)*8;
 const idx=Math.floor(phase);
 const phases = lang === 'de' ? MOON_PHASES_DE : MOON_PHASES_EN;
 return {...phases[idx%8], phaseIndex: idx%8};
 };

 // Moon Phase SVG Component - Realistischer Mond
 const MoonPhaseSVG = ({phaseIndex, size='large'}) => {
     const isSmall = size === 'small';
     const g = '#d4af37';
     const moonLight = '#f5f5dc';
     const moonGlow = '#fffacd';
     const dark = '#0a1a3a';
     
     // Krater für realistisches Aussehen
     const craters = [
         {cx: 85, cy: 80, r: 8},
         {cx: 115, cy: 95, r: 6},
         {cx: 95, cy: 120, r: 10},
         {cx: 120, cy: 75, r: 5},
         {cx: 75, cy: 110, r: 7},
         {cx: 105, cy: 85, r: 4},
     ];
     
     const renderMoonPhase = () => {
         switch(phaseIndex) {
             case 0: // Neumond
                 return (
                     <>
                         <circle cx="100" cy="100" r="50" fill={dark} stroke={g} strokeWidth="1.5"/>
                         <circle cx="100" cy="100" r="52" fill="none" stroke={moonLight} strokeWidth="0.5" opacity="0.3"/>
                     </>
                 );
             case 1: // Zunehmende Sichel
                 return (
                     <>
                         <defs>
                             <clipPath id="waxingCrescent">
                                 <circle cx="100" cy="100" r="50"/>
                             </clipPath>
                         </defs>
                         <circle cx="100" cy="100" r="50" fill={moonLight}/>
                         <circle cx="80" cy="100" r="48" fill={dark} clipPath="url(#waxingCrescent)"/>
                         {craters.filter(c => c.cx > 110).map((c,i) => (
                             <circle key={i} cx={c.cx} cy={c.cy} r={c.r} fill={dark} opacity="0.15"/>
                         ))}
                     </>
                 );
             case 2: // Erstes Viertel
                 return (
                     <>
                         <circle cx="100" cy="100" r="50" fill={moonLight}/>
                         <path d="M100,50 A50,50 0 0,0 100,150 L100,50" fill={dark}/>
                         {craters.filter(c => c.cx > 100).map((c,i) => (
                             <circle key={i} cx={c.cx} cy={c.cy} r={c.r} fill={dark} opacity="0.15"/>
                         ))}
                     </>
                 );
             case 3: // Zunehmender Dreiviertelmond
                 return (
                     <>
                         <defs>
                             <clipPath id="waxingGibbous">
                                 <circle cx="100" cy="100" r="50"/>
                             </clipPath>
                         </defs>
                         <circle cx="100" cy="100" r="50" fill={moonLight}/>
                         <ellipse cx="80" cy="100" rx="25" ry="50" fill={dark} clipPath="url(#waxingGibbous)"/>
                         {craters.map((c,i) => (
                             <circle key={i} cx={c.cx} cy={c.cy} r={c.r} fill={dark} opacity="0.15"/>
                         ))}
                     </>
                 );
             case 4: // Vollmond
                 return (
                     <>
                         <circle cx="100" cy="100" r="52" fill={moonGlow} opacity="0.3"/>
                         <circle cx="100" cy="100" r="50" fill={moonLight}/>
                         {craters.map((c,i) => (
                             <circle key={i} cx={c.cx} cy={c.cy} r={c.r} fill={dark} opacity="0.12"/>
                         ))}
                         {/* Subtile Textur */}
                         <circle cx="90" cy="90" r="3" fill={dark} opacity="0.08"/>
                         <circle cx="110" cy="105" r="2" fill={dark} opacity="0.08"/>
                     </>
                 );
             case 5: // Abnehmender Dreiviertelmond
                 return (
                     <>
                         <defs>
                             <clipPath id="waningGibbous">
                                 <circle cx="100" cy="100" r="50"/>
                             </clipPath>
                         </defs>
                         <circle cx="100" cy="100" r="50" fill={moonLight}/>
                         <ellipse cx="120" cy="100" rx="25" ry="50" fill={dark} clipPath="url(#waningGibbous)"/>
                         {craters.filter(c => c.cx < 110).map((c,i) => (
                             <circle key={i} cx={c.cx} cy={c.cy} r={c.r} fill={dark} opacity="0.15"/>
                         ))}
                     </>
                 );
             case 6: // Letztes Viertel
                 return (
                     <>
                         <circle cx="100" cy="100" r="50" fill={moonLight}/>
                         <path d="M100,50 A50,50 0 0,1 100,150 L100,50" fill={dark}/>
                         {craters.filter(c => c.cx < 100).map((c,i) => (
                             <circle key={i} cx={c.cx} cy={c.cy} r={c.r} fill={dark} opacity="0.15"/>
                         ))}
                     </>
                 );
             case 7: // Abnehmende Sichel
                 return (
                     <>
                         <defs>
                             <clipPath id="waningCrescent">
                                 <circle cx="100" cy="100" r="50"/>
                             </clipPath>
                         </defs>
                         <circle cx="100" cy="100" r="50" fill={moonLight}/>
                         <circle cx="120" cy="100" r="48" fill={dark} clipPath="url(#waningCrescent)"/>
                         {craters.filter(c => c.cx < 90).map((c,i) => (
                             <circle key={i} cx={c.cx} cy={c.cy} r={c.r} fill={dark} opacity="0.15"/>
                         ))}
                     </>
                 );
             default:
                 return <circle cx="100" cy="100" r="50" fill={moonLight}/>;
         }
     };
     
     if(isSmall) {
         return (
             <svg viewBox="0 0 200 200" className="w-full h-full">
                 {renderMoonPhase()}
             </svg>
         );
     }
     
     return (
         <svg viewBox="0 0 200 200" className="w-full h-full moon-container">
             {/* Äußerer Glow */}
             <circle cx="100" cy="100" r="70" fill="none" stroke={g} strokeWidth="0.5" opacity="0.2"/>
             <circle cx="100" cy="100" r="80" fill="none" stroke={g} strokeWidth="0.3" opacity="0.1"/>
             
             {/* Mondphase */}
             {renderMoonPhase()}
             
             {/* Äußerer Ring */}
             <circle cx="100" cy="100" r="55" fill="none" stroke={g} strokeWidth="1.5" opacity="0.6"/>
             
             {/* Animierte Sterne drumherum */}
             <circle className="moon-star moon-star-1" cx="40" cy="40" r="2" fill="white"/>
             <circle className="moon-star moon-star-2" cx="160" cy="50" r="1.5" fill="white"/>
             <circle className="moon-star moon-star-3" cx="45" cy="160" r="1.5" fill="white"/>
             <circle className="moon-star moon-star-4" cx="155" cy="155" r="2" fill="white"/>
             <circle className="moon-star moon-star-1" cx="30" cy="100" r="1" fill="white"/>
             <circle className="moon-star moon-star-3" cx="170" cy="100" r="1" fill="white"/>
         </svg>
     );
 };

 {num:7,name:'Der Wagen',
 meaning:'Der Wagen zeigt einen Krieger, der zwei Sphinxe durch pure Willenskraft lenkt. Er symbolisiert Triumph durch Entschlossenheit, die Überwindung von Hindernissen und vorwärtsgerichtete Bewegung. Erfolg kommt durch Fokus und Selbstdisziplin.',
 advice:'Bleibe fokussiert und entschlossen. Du hast die Kraft, alle Hindernisse zu überwinden. Zügel deine widerstreitenden Impulse.',
 love:'Nimm die Zügel in die Hand. Wenn du weißt was du willst, geh aktiv darauf zu.',
 career:'Großer Erfolg durch Willenskraft und Durchsetzungsvermögen. Beförderung oder Anerkennung möglich.',
 reversed:'Mangel an Richtung oder Kontrolle. Innere Konflikte bremsen deinen Fortschritt.'},
 {num:8,name:'Die Kraft',
 meaning:'Die Kraft zeigt eine Frau, die sanft den Rachen eines Löwen schließt. Sie symbolisiert nicht rohe Gewalt, sondern die Macht der Sanftmut, Geduld und des Mitgefühls. Wahre Stärke liegt in der Fähigkeit, die eigenen Instinkte mit Liebe zu zähmen.',
 advice:'Sanfte Stärke ist mächtiger als Gewalt. Begegne Herausforderungen mit Geduld und Mitgefühl - auch dir selbst gegenüber.',
 love:'Mit Geduld und Verständnis können Beziehungsprobleme gemeistert werden. Zeige deine verletzliche Seite.',
 career:'Ausdauer und emotionale Intelligenz führen zum Erfolg. Bleib ruhig unter Druck.',
 reversed:'Selbstzweifel, unterdrückte Emotionen oder mangelndes Selbstvertrauen.'},
 {num:9,name:'Der Eremit',
 meaning:'Der Eremit steht allein auf dem Berggipfel, seine Laterne erhellt den Weg für jene, die ihm folgen. Er symbolisiert die Suche nach innerer Wahrheit, Weisheit durch Erfahrung und die Notwendigkeit von Rückzug und Reflexion. Manchmal müssen wir allein gehen, um uns selbst zu finden.',
 advice:'Zeit für Innenschau und Reflexion. Ziehe dich zurück vom Lärm der Welt und suche Antworten in der Stille.',
 love:'Qualität vor Quantität. Vielleicht brauchst du Zeit für dich selbst, bevor du dich auf andere einlassen kannst.',
 career:'Entwickle tiefere Expertise. Mentorship - entweder als Gebender oder Empfangender - könnte wichtig sein.',
 reversed:'Zu viel Isolation oder die Weigerung, Hilfe anzunehmen.'},
 {num:10,name:'Rad des Schicksals',
 meaning:'Das Rad des Schicksals dreht sich ewig - was oben ist, wird unten sein, und umgekehrt. Diese Karte erinnert uns an die Zyklen des Lebens, an Schicksal und Karma. Sie zeigt, dass Veränderung die einzige Konstante ist und dass wir lernen müssen, mit den Höhen und Tiefen zu fließen.',
 advice:'Veränderung kommt - sei bereit und flexibel. Das Rad dreht sich zu deinen Gunsten, wenn du im Einklang mit dem Universum bist.',
 love:'Überraschende Wendungen in der Liebe. Das Schicksal könnte eine wichtige Person in dein Leben bringen.',
 career:'Ein Wendepunkt steht bevor. Karrierewechsel oder unerwartete Chancen sind möglich.',
 reversed:'Pechsträhne oder das Gefühl, vom Schicksal benachteiligt zu werden. Durchhalte - das Rad dreht sich weiter.'},
 {num:11,name:'Die Gerechtigkeit',
 meaning:'Die Gerechtigkeit sitzt zwischen den Säulen, Schwert und Waage in den Händen. Sie repräsentiert Fairness, Wahrheit, Ursache und Wirkung. Diese Karte erinnert uns, dass unsere Handlungen Konsequenzen haben und dass das Universum letztlich für Balance sorgt.',
 advice:'Handle fair und ehrlich. Nimm Verantwortung für deine Entscheidungen und sei bereit, die Konsequenzen zu tragen.',
 love:'Balance zwischen Geben und Nehmen ist essentiell. Fairness und Ehrlichkeit stärken die Beziehung.',
 career:'Faire Behandlung und gerechte Entscheidungen. Rechtliche Angelegenheiten werden zu deinen Gunsten ausgehen.',
 reversed:'Ungerechtigkeit, Unehrlichkeit oder Weigerung, Verantwortung zu übernehmen.'},
 {num:12,name:'Der Gehängte',
 meaning:'Der Gehängte hängt kopfüber, doch sein Gesicht ist friedlich und von einem Heiligenschein umgeben. Er hat die Welt aus einer völlig neuen Perspektive sehen gelernt. Diese Karte symbolisiert freiwilliges Opfer, Loslassen und die Weisheit, die durch Geduld entsteht.',
 advice:'Sieh die Dinge aus einer anderen Perspektive. Manchmal bedeutet Loslassen mehr Gewinn als Festhalten. Geduld wird belohnt.',
 love:'Manchmal muss man warten und die Kontrolle abgeben. Die Beziehung könnte von einem Perspektivwechsel profitieren.',
 career:'Anders denken bringt Lösungen. Eine Pause oder ein Schritt zurück könnte genau das sein, was du brauchst.',
 reversed:'Stagnation, Widerstand gegen notwendige Opfer oder Angst vor Veränderung.'},
 {num:13,name:'Der Tod',
 meaning:'Der Tod reitet auf seinem weißen Pferd, vor ihm fallen Könige und Bettler gleichermaßen. Doch diese Karte bedeutet selten den physischen Tod - sie symbolisiert das Ende eines Zyklus und den Beginn eines neuen. Transformation erfordert, dass das Alte stirbt, damit das Neue geboren werden kann.',
 advice:'Lass los, was nicht mehr dient. Akzeptiere das Ende als notwendigen Teil des Wandels. Wiedergeburt wartet auf dich.',
 love:'Eine Beziehung transformiert sich grundlegend - entweder durch Erneuerung oder durch ein notwendiges Ende.',
 career:'Großer Wandel steht bevor. Ein Kapitel endet, ein neues beginnt. Widerstand ist zwecklos.',
 reversed:'Widerstand gegen unvermeidliche Veränderung oder Angst vor dem Loslassen.'},
 {num:14,name:'Die Mäßigkeit',
 meaning:'Der Engel der Mäßigkeit gießt Wasser zwischen zwei Kelchen, einen Fuß im Wasser, einen auf dem Land. Sie symbolisiert Balance, Harmonie und die Kunst des goldenen Mittelwegs. Geduld und Mäßigung führen zu innerem Frieden.',
 advice:'Finde die goldene Mitte in allen Dingen. Balance und Harmonie entstehen durch geduldige Integration von Gegensätzen.',
 love:'Harmonie durch Kompromisse und gegenseitiges Verständnis. Die Beziehung findet ihre Balance.',
 career:'Langfristiger, nachhaltiger Erfolg durch ausgewogenes Vorgehen. Geduld zahlt sich aus.',
 reversed:'Ungleichgewicht, Übermaß oder mangelnde Selbstkontrolle.'},
 {num:15,name:'Der Teufel',
 meaning:'Der Teufel thront über zwei angeketteten Figuren, doch ihre Ketten sind lose - sie könnten sich jederzeit befreien. Diese Karte symbolisiert Bindungen, die wir selbst erschaffen haben: Süchte, Materialismus, toxische Beziehungen. Sie lädt zur Schattenarbeit ein.',
 advice:'Erkenne die Ketten, die du dir selbst angelegt hast. Deine Schatten zu kennen ist der erste Schritt zur Befreiung.',
 love:'Überprüfe, ob die Beziehung auf gesunden Fundamenten steht. Leidenschaft ist gut, Abhängigkeit nicht.',
 career:'Vorsicht vor Gier oder unethischem Verhalten. Überprüfe deine wahren Motivationen.',
 reversed:'Befreiung von Abhängigkeiten und negativen Mustern. Du erkennst, was dich gefangen hielt.'},
 {num:16,name:'Der Turm',
 meaning:'Der Turm wird vom Blitz getroffen, Figuren stürzen in die Tiefe. Diese erschütternde Karte symbolisiert plötzlichen Zusammenbruch, Chaos und die Zerstörung falscher Strukturen. Doch der Blitz bringt auch Erleuchtung - was auf Lügen gebaut war, kann nicht bestehen.',
 advice:'Manchmal muss alles zusammenbrechen, damit Wahres entstehen kann. Der Sturm reinigt. Lass los.',
 love:'Wahrheit kommt ans Licht, auch wenn sie schmerzt. Falsche Beziehungen enden, wahre werden stärker.',
 career:'Plötzliche, unerwartete Umwälzung. Was instabil war, stürzt ein - doch es eröffnet neue Möglichkeiten.',
 reversed:'Angst vor unvermeidbarer Veränderung oder der Versuch, Unhaltbares aufrechtzuerhalten.'},
 {num:17,name:'Der Stern',
 meaning:'Nach dem Sturm des Turms kommt der Stern - eine nackte Frau kniet am Wasser unter einem funkelnden Sternenhimmel. Diese Karte ist pure Hoffnung, Heilung und Inspiration. Sie erinnert uns daran, dass nach jeder Dunkelheit das Licht zurückkehrt.',
 advice:'Nach der Dunkelheit kommt immer das Licht. Vertraue darauf, dass das Universum dich führt. Hoffnung ist berechtigt.',
 love:'Hoffnung und Heilung in der Liebe. Eine Zeit der Erneuerung und des Vertrauens.',
 career:'Deine Träume können wahr werden. Folge deiner Inspiration und deinem höheren Ruf.',
 reversed:'Vorübergehende Hoffnungslosigkeit oder verlorener Glaube. Erinnere dich an dein inneres Licht.'},
 {num:18,name:'Der Mond',
 meaning:'Der Mond scheint auf einen Pfad zwischen zwei Türmen, ein Wolf und ein Hund heulen, ein Krebs kriecht aus dem Wasser. Diese mysteriöse Karte symbolisiert Illusionen, verborgene Ängste und das Reich des Unbewussten. Nicht alles ist, wie es scheint.',
 advice:'Navigiere vorsichtig durch Unsicherheit. Vertraue deiner Intuition, aber hüte dich vor Selbsttäuschung. Klarheit wird kommen.',
 love:'Verborgene Gefühle oder Unsicherheiten. Zeit, ehrlich zu den eigenen Ängsten zu stehen.',
 career:'Unklarheit und mögliche Täuschungen. Warte auf mehr Information, bevor du entscheidest.',
 reversed:'Ängste werden überwunden, Illusionen aufgelöst. Die Wahrheit kommt langsam ans Licht.'},
 {num:19,name:'Die Sonne',
 meaning:'Die Sonne strahlt über einem fröhlichen Kind auf einem weißen Pferd. Dies ist die positivste Karte im Tarot - pure Freude, Erfolg, Vitalität und Optimismus. Wie die Sonne verbreitet diese Karte Wärme und Licht in alle Bereiche deines Lebens.',
 advice:'Die Sonne scheint auf dich! Genieße diesen Moment des Glücks und der Klarheit. Teile deine Freude mit anderen.',
 love:'Glückliche, freudvolle Zeiten in der Liebe. Authentizität und Wärme prägen die Beziehung.',
 career:'Großer Erfolg und Anerkennung! Deine harte Arbeit trägt sichtbare Früchte.',
 reversed:'Die Freude ist nur vorübergehend verzögert, nicht verhindert. Halte an deinem Optimismus fest.'},
 {num:20,name:'Das Gericht',
 meaning:'Der Engel bläst seine Posaune, und die Toten erheben sich aus ihren Gräbern. Diese Karte symbolisiert Wiedergeburt, den Ruf des Schicksals und die Zeit der Abrechnung. Es ist Zeit, das Leben zu reflektieren und einen höheren Ruf zu folgen.',
 advice:'Höre auf den Ruf deiner Seele. Zeit für ehrliche Selbstreflexion und vielleicht eine zweite Chance zu nutzen.',
 love:'Eine zweite Chance in der Liebe oder die Möglichkeit, vergangene Fehler wiedergutzumachen.',
 career:'Ein Ruf zur wahren Berufung. Zeit, das zu tun, wofür du wirklich bestimmt bist.',
 reversed:'Selbstzweifel oder die Weigerung, vergangene Fehler anzuerkennen und zu lernen.'},
 {num:21,name:'Die Welt',
 meaning:'Eine tanzende Figur im Lorbeerkranz, umgeben von den vier Elementen. Die Welt ist die letzte Karte der großen Arkana und symbolisiert Vollendung, Integration und die erfolgreiche Beendigung eines wichtigen Lebenszyklus. Du hast es geschafft!',
 advice:'Feiere deine Erfolge! Ein wichtiger Zyklus ist vollendet. Bereite dich auf den nächsten Abschnitt deiner Reise vor.',
 love:'Erfüllte, vollständige Beziehung. Ein Gefühl von Ganzheit und tiefem Glück.',
 career:'Ziel erreicht! Ein Projekt ist erfolgreich abgeschlossen. Neue Horizonte eröffnen sich.',
 reversed:'Kurz vor dem Ziel - ein letzter Schritt fehlt noch. Oder Schwierigkeit, ein Kapitel abzuschließen.'}
 ];

 const TAROT_EN=[
 {num:0,name:'The Fool',meaning:'The Fool symbolizes the beginning of a journey, pure innocence and limitless possibilities. He stands at the edge of the abyss, ready to leap into the unknown - full of trust and childlike curiosity.',advice:'Take the leap into the unknown! The universe will catch you. Trust the process and let go of your fears.',love:'An exciting new romance could begin. Be open to unexpected encounters.',career:'Time for a bold new start. A new project or career change might be just right.',reversed:'Warning against recklessness and thoughtless decisions.'},
 {num:1,name:'The Magician',meaning:'The Magician embodies the power of manifestation. With all four elements on his table, he shows that you possess all the tools to realize your dreams. "As above, so below" - your thoughts shape your reality.',advice:'You have all the skills and resources you need. Focus your willpower and act now with full conviction!',love:'You have the power to create the relationship you desire. Communicate your wishes clearly.',career:'Use all your talents and abilities. Now is the time to put your visions into action.',reversed:'Beware of manipulation or self-deception.'},
 {num:2,name:'The High Priestess',meaning:'The High Priestess guards the secrets between the pillars B and J, between light and darkness. She represents deep intuitive knowledge, the unconscious and the mysteries of life.',advice:'Listen to your intuition - it knows truths that the mind cannot grasp. Meditation and silence will bring you answers.',love:'Trust your gut feeling in matters of the heart. There may be hidden aspects in your relationship to discover.',career:'Wait for the right moment. Not everything needs to be decided immediately.',reversed:'You are ignoring your intuition or there is hidden information you cannot see.'},
 {num:3,name:'The Empress',meaning:'The Empress is the mother of all things - fertility, abundance and the nurturing power of nature. She sits amidst a lush garden and reminds us that growth and creativity are natural processes.',advice:'Nurture yourself and others. Surround yourself with beauty and allow yourself to enjoy life fully.',love:'Love is blooming! A time of romance, sensuality and possibly fertility.',career:'Creative projects will be successful. Your ideas bear fruit - nurture them with patience.',reversed:'Creative blockage or neglect of self-care.'},
 {num:4,name:'The Emperor',meaning:'The Emperor sits on his throne as a symbol of authority, structure and worldly power. He represents stability, order and the ability to turn visions into concrete reality.',advice:'Take responsibility and create structure in your life. Sometimes clear boundaries and discipline are needed.',love:'Stability and security in the relationship. Time to make long-term plans.',career:'Show leadership qualities. Your ability to organize and lead is needed now.',reversed:'Over-control, rigidity or abuse of power.'},
 {num:5,name:'The Hierophant',meaning:'The Hierophant is the spiritual teacher who builds bridges between the divine and the human. He represents tradition, conventional wisdom and established institutions.',advice:'Seek advice from a mentor or teacher. Sometimes wisdom lies in proven traditions.',love:'Traditional values and commitment are in focus. Perhaps time for official steps like engagement.',career:'Follow proven methods and established structures. Further education could be important.',reversed:'Rebellion against conventions or feeling constrained by dogmas.'},
 {num:6,name:'The Lovers',meaning:'The Lovers stand under the blessing angel and symbolize not only romantic love but also important life decisions. This card speaks of harmony, attraction and the union of opposites.',advice:'Follow your heart in important decisions. Authenticity and sincerity are essential now.',love:'Deep, meaningful connection. You may meet your soulmate or deepen your existing relationship.',career:'Partnerships and collaborations are favored. Decisions should be made with the heart.',reversed:'Disharmony, indecision or imbalance in relationships.'},
 {num:7,name:'The Chariot',meaning:'The Chariot shows a warrior steering two sphinxes through pure willpower. It symbolizes triumph through determination, overcoming obstacles and forward movement.',advice:'Stay focused and determined. You have the power to overcome all obstacles.',love:'Take the reins. If you know what you want, go for it actively.',career:'Great success through willpower and assertiveness. Promotion possible.',reversed:'Lack of direction or control. Inner conflicts slow your progress.'},
 {num:8,name:'Strength',meaning:'Strength shows a woman gently closing the jaws of a lion. It symbolizes not brute force but the power of gentleness, patience and compassion.',advice:'Gentle strength is more powerful than violence. Meet challenges with patience and compassion.',love:'With patience and understanding, relationship problems can be mastered.',career:'Endurance and emotional intelligence lead to success. Stay calm under pressure.',reversed:'Self-doubt, suppressed emotions or lack of self-confidence.'},
 {num:9,name:'The Hermit',meaning:'The Hermit stands alone on the mountain peak, his lantern lighting the way for those who follow. He symbolizes the search for inner truth and wisdom through experience.',advice:'Time for introspection and reflection. Withdraw from the noise of the world and seek answers in silence.',love:'Quality over quantity. Perhaps you need time for yourself.',career:'Develop deeper expertise. Mentorship could be important.',reversed:'Too much isolation or refusal to accept help.'},
 {num:10,name:'Wheel of Fortune',meaning:'The Wheel of Fortune turns eternally - what is up will be down, and vice versa. This card reminds us of life cycles, fate and karma.',advice:'Change is coming - be ready and flexible. The wheel turns in your favor when you are in harmony with the universe.',love:'Surprising twists in love. Fate could bring an important person into your life.',career:'A turning point is coming. Career change or unexpected opportunities possible.',reversed:'Bad luck streak or feeling disadvantaged by fate. Hold on - the wheel keeps turning.'},
 {num:11,name:'Justice',meaning:'Justice sits between the pillars, sword and scales in hand. She represents fairness, truth, cause and effect.',advice:'Act fairly and honestly. Take responsibility for your decisions.',love:'Balance between giving and taking is essential. Fairness strengthens the relationship.',career:'Fair treatment and just decisions. Legal matters will go in your favor.',reversed:'Injustice, dishonesty or refusal to take responsibility.'},
 {num:12,name:'The Hanged Man',meaning:'The Hanged Man hangs upside down, yet his face is peaceful. He has learned to see the world from a completely new perspective.',advice:'See things from a different perspective. Sometimes letting go means more gain than holding on.',love:'Sometimes you have to wait and give up control.',career:'Thinking differently brings solutions. A pause might be what you need.',reversed:'Stagnation or resistance to necessary sacrifices.'},
 {num:13,name:'Death',meaning:'Death rides on his white horse. This card rarely means physical death - it symbolizes the end of a cycle and the beginning of a new one. Transformation requires the old to die.',advice:'Let go of what no longer serves. Accept endings as necessary parts of change. Rebirth awaits.',love:'A relationship transforms fundamentally - either through renewal or necessary ending.',career:'Great change is coming. One chapter ends, a new one begins.',reversed:'Resistance to inevitable change or fear of letting go.'},
 {num:14,name:'Temperance',meaning:'The angel of Temperance pours water between two cups. She symbolizes balance, harmony and the art of the golden middle way.',advice:'Find the golden middle in all things. Balance and harmony arise through patient integration of opposites.',love:'Harmony through compromise and mutual understanding.',career:'Long-term, sustainable success through balanced approach.',reversed:'Imbalance, excess or lack of self-control.'},
 {num:15,name:'The Devil',meaning:'The Devil thrones over two chained figures, but their chains are loose - they could free themselves anytime. This card symbolizes bonds we create ourselves: addictions, materialism, toxic relationships.',advice:'Recognize the chains you have put on yourself. Knowing your shadows is the first step to liberation.',love:'Check if the relationship stands on healthy foundations.',career:'Beware of greed or unethical behavior.',reversed:'Liberation from dependencies and negative patterns.'},
 {num:16,name:'The Tower',meaning:'The Tower is struck by lightning, figures fall into the depths. This card symbolizes sudden collapse, chaos and destruction of false structures. Yet lightning also brings enlightenment.',advice:'Sometimes everything must collapse for truth to emerge. The storm cleanses. Let go.',love:'Truth comes to light, even if it hurts. False relationships end.',career:'Sudden, unexpected upheaval. What was unstable collapses - but opens new possibilities.',reversed:'Fear of unavoidable change.'},
 {num:17,name:'The Star',meaning:'After the storm of the Tower comes the Star - pure hope, healing and inspiration. It reminds us that after every darkness, light returns.',advice:'After darkness always comes light. Trust that the universe guides you. Hope is justified.',love:'Hope and healing in love. A time of renewal and trust.',career:'Your dreams can come true. Follow your inspiration.',reversed:'Temporary hopelessness or lost faith. Remember your inner light.'},
 {num:18,name:'The Moon',meaning:'The Moon shines on a path between two towers. This mysterious card symbolizes illusions, hidden fears and the realm of the unconscious. Not everything is as it seems.',advice:'Navigate carefully through uncertainty. Trust your intuition but beware of self-deception.',love:'Hidden feelings or insecurities. Time to be honest about your fears.',career:'Uncertainty and possible deceptions. Wait for more information.',reversed:'Fears are overcome, illusions dissolved. Truth slowly comes to light.'},
 {num:19,name:'The Sun',meaning:'The Sun shines over a joyful child on a white horse. This is the most positive card in Tarot - pure joy, success, vitality and optimism.',advice:'The sun shines on you! Enjoy this moment of happiness and clarity. Share your joy.',love:'Happy, joyful times in love. Authenticity and warmth characterize the relationship.',career:'Great success and recognition! Your hard work bears visible fruit.',reversed:'Joy is only temporarily delayed, not prevented. Hold onto your optimism.'},
 {num:20,name:'Judgement',meaning:'The angel blows his trumpet and the dead rise from their graves. This card symbolizes rebirth, the call of destiny and time of reckoning.',advice:'Listen to the call of your soul. Time for honest self-reflection and perhaps a second chance.',love:'A second chance in love or the opportunity to make amends.',career:'A call to true vocation. Time to do what you are truly destined for.',reversed:'Self-doubt or refusal to acknowledge past mistakes.'},
 {num:21,name:'The World',meaning:'A dancing figure in a laurel wreath, surrounded by the four elements. The World is the last card of the Major Arcana and symbolizes completion, integration and successful completion of an important life cycle.',advice:'Celebrate your successes! An important cycle is complete. Prepare for the next stage of your journey.',love:'Fulfilled, complete relationship. A feeling of wholeness and deep happiness.',career:'Goal achieved! A project is successfully completed. New horizons open.',reversed:'Almost at the goal - one last step is missing.'}
 ];

 const letterValues={A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8};
 const vowels=['A','E','I','O','U'];
 
 const reduceToSingle=(n)=>{
  while(n>9&&n!==11&&n!==22&&n!==33){n=String(n).split('').reduce((a,b)=>a+parseInt(b),0)}
  return n;
 };
 
 const calcLetterology=(name)=>{
  if(!name)return null;
  const clean=name.toUpperCase().replace(/[^A-Z]/g,'');
  if(!clean)return null;
  let expression=0,soulUrge=0,personality=0;
  for(let c of clean){
   const v=letterValues[c]||0;
   expression+=v;
   if(vowels.includes(c))soulUrge+=v;
   else personality+=v;
  }
  return{
   expression:reduceToSingle(expression),
   soulUrge:reduceToSingle(soulUrge),
   personality:reduceToSingle(personality),
   rawExpression:expression,
   rawSoul:soulUrge,
   rawPersonality:personality
  };
 };

 const calculateBaZi = () => {
  const bd = userProfile?.birthDate || birthDate;
  if(!bd) return null;
  
  const [year, month, day] = bd.split('-').map(Number);
  
  // Jahr-Säule (vereinfacht)
  const yearStemIndex = (year - 4) % 10;
  const yearBranchIndex = (year - 4) % 12;
  
  // Monat-Säule (vereinfacht - basiert auf Solar-Kalender)
  const monthStemIndex = ((year - 4) % 5 * 2 + month + 1) % 10;
  const monthBranchIndex = (month + 1) % 12;
  
  // Tag-Säule (vereinfacht - Formel basiert auf Gregorianischem Kalender)
  const a = Math.floor((14 - month) / 12);
  const y = year - a;
  const m = month + 12 * a - 2;
  const dayNumber = (day + y + Math.floor(y/4) - Math.floor(y/100) + Math.floor(y/400) + Math.floor(31*m/12)) % 60;
  const dayStemIndex = dayNumber % 10;
  const dayBranchIndex = dayNumber % 12;
  
  // Stunden-Säule (benötigt Geburtszeit)
  let hour = null;
  if(birthTime) {
   const [h, min] = birthTime.split(':').map(Number);
   // 12 Doppelstunden: 23-01=0(Ratte), 01-03=1(Büffel), etc.
   let hourBranchIndex;
   if(h === 23 || h === 0) hourBranchIndex = 0;
   else hourBranchIndex = Math.floor((h + 1) / 2);
   
   // Himmlischer Stamm der Stunde basiert auf Tages-Stamm
   // 甲己→甲, 乙庚→丙, 丙辛→戊, 丁壬→庚, 戊癸→壬
   const hourStemStart = [0, 2, 4, 6, 8, 0, 2, 4, 6, 8][dayStemIndex];
   const hourStemIndex = (hourStemStart + hourBranchIndex) % 10;
   
   const stems = lang === 'de' ? HEAVENLY_STEMS.de : HEAVENLY_STEMS.en;
   const branches = lang === 'de' ? EARTHLY_BRANCHES.de : EARTHLY_BRANCHES.en;
   
   hour = { stem: stems[hourStemIndex], branch: branches[hourBranchIndex] };
  }
  
  const stems = lang === 'de' ? HEAVENLY_STEMS.de : HEAVENLY_STEMS.en;
  const branches = lang === 'de' ? EARTHLY_BRANCHES.de : EARTHLY_BRANCHES.en;
  
  return {
   year: { stem: stems[yearStemIndex], branch: branches[yearBranchIndex] },
   month: { stem: stems[monthStemIndex], branch: branches[monthBranchIndex] },
   day: { stem: stems[dayStemIndex], branch: branches[dayBranchIndex] },
   hour: hour,
   dayMaster: stems[dayStemIndex]
  };
 };

 // Julianisches Datum berechnen
 const toJulianDate = (year, month, day, hour, minute) => {
  let y = year, m = month;
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  const JD = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + day + B - 1524.5;
  return JD + (hour + minute / 60) / 24;
 };
 
 // Grad zu Radiant
 const rad = (deg) => deg * Math.PI / 180;
 const deg = (r) => r * 180 / Math.PI;
 
 // Winkel normalisieren (0-360)
 const norm360 = (x) => { x = x % 360; return x < 0 ? x + 360 : x; };
 
 // Schiefe der Ekliptik (IAU 2006 Präzession)
 const obliquity = (JD) => {
  const T = (JD - 2451545.0) / 36525;
  // Präzise Formel nach IAU 2006
  return 23.439291111 
       - 0.0130042 * T 
       - 0.00000016 * T * T 
       + 0.000000504 * T * T * T;
 };
 
 // Nutation in Länge (vereinfacht für höhere Genauigkeit)
 const nutationLongitude = (JD) => {
  const T = (JD - 2451545.0) / 36525;
  const D = 297.85036 + 445267.111480 * T;
  const M = 357.52772 + 35999.050340 * T;
  const Mp = 134.96298 + 477198.867398 * T;
  const F = 93.27191 + 483202.017538 * T;
  const Om = 125.04452 - 1934.136261 * T;
  
  // Hauptterme der Nutation
  const nutLon = -17.20 * Math.sin(rad(Om))
               - 1.32 * Math.sin(rad(2 * (280.4665 + 36000.7698 * T)))
               - 0.23 * Math.sin(rad(2 * Mp))
               + 0.21 * Math.sin(rad(2 * Om));
  
  return nutLon / 3600; // Bogensekunden zu Grad
 };
 
 // Greenwich Mean Sidereal Time (in Grad)
 const GMST = (JD) => {
  const T = (JD - 2451545.0) / 36525;
  let gmst = 280.46061837 + 360.98564736629 * (JD - 2451545.0) + 0.000387933 * T * T;
  return norm360(gmst);
 };
 
 // Lokale Sternzeit
 const LST = (JD, longitude) => norm360(GMST(JD) + longitude);
 
 // PLANETENPOSITIONEN (VERBESSERTE VSOP87-basierte Formeln mit mehr Termen)
 // Genauigkeit: Sonne ~0.01°, Mond ~0.3°, innere Planeten ~0.1°, äußere ~0.3°
 const getPlanetPosition = (JD, planet) => {
  const T = (JD - 2451545.0) / 36525; // Jahrhunderte seit J2000
  const T2 = T * T;
  const T3 = T2 * T;
  
  let L, lat = 0; // Ekliptische Länge und Breite
  
  switch(planet) {
   case 'sun':
    // Sonne - VSOP87 mit erweiterten Termen (Genauigkeit ~0.01°)
    const L0s = 280.4664567 + 36000.76982779 * T + 0.0003032028 * T2;
    const M0s = 357.5291092 + 35999.0502909 * T - 0.0001536 * T2 + T3 / 24490000;
    const Ms = rad(M0s);
    // Zentrumsgleichung mit mehr Termen
    const Cs = (1.9146000 - 0.004817 * T - 0.000014 * T2) * Math.sin(Ms) 
             + (0.019993 - 0.000101 * T) * Math.sin(2 * Ms)
             + 0.000290 * Math.sin(3 * Ms);
    // Scheinbare Länge (inklusive Nutation vereinfacht)
    const omega = 125.04 - 1934.136 * T;
    const sunLong = L0s + Cs - 0.00569 - 0.00478 * Math.sin(rad(omega));
    L = norm360(sunLong);
    break;

    // Mond - erweiterte Chapront-Formeln (ELP2000, ~60 Terme, Genauigkeit ~0.3°)
    const Lp = 218.3164477 + 481267.88123421 * T - 0.0015786 * T2 + T3 / 538841 - T2*T2 / 65194000;
    const D = 297.8501921 + 445267.1114034 * T - 0.0018819 * T2 + T3 / 545868 - T2*T2 / 113065000;
    const Mm = 134.9633964 + 477198.8675055 * T + 0.0087414 * T2 + T3 / 69699 - T2*T2 / 14712000;
    const Mp = 357.5291092 + 35999.0502909 * T - 0.0001536 * T2 + T3 / 24490000;
    const F = 93.2720950 + 483202.0175233 * T - 0.0036539 * T2 - T3 / 3526000 + T2*T2 / 863310000;
    
    const Dr = rad(D), Mr = rad(Mm), Mpr = rad(Mp), Fr = rad(F);
    
    // Länge - 25 Hauptterme
    L = Lp 
      + 6.288774 * Math.sin(Mr)
      + 1.274027 * Math.sin(2*Dr - Mr)
      + 0.658314 * Math.sin(2*Dr)
      + 0.213618 * Math.sin(2*Mr)
      - 0.185116 * Math.sin(Mpr)
      - 0.114332 * Math.sin(2*Fr)
      + 0.058793 * Math.sin(2*Dr - 2*Mr)
      + 0.057066 * Math.sin(2*Dr - Mpr - Mr)
      + 0.053322 * Math.sin(2*Dr + Mr)
      + 0.045758 * Math.sin(2*Dr - Mpr)
      - 0.040923 * Math.sin(Mpr - Mr)
      - 0.034720 * Math.sin(Dr)
      - 0.030383 * Math.sin(Mpr + Mr)
      + 0.015327 * Math.sin(2*Dr - 2*Fr)
      - 0.012528 * Math.sin(Mr + 2*Fr)
      + 0.010980 * Math.sin(Mr - 2*Fr)
      + 0.010675 * Math.sin(4*Dr - Mr)
      + 0.010034 * Math.sin(3*Mr)
      + 0.008548 * Math.sin(4*Dr - 2*Mr)
      - 0.007888 * Math.sin(2*Dr + Mpr - Mr)
      - 0.006766 * Math.sin(2*Dr + Mpr)
      - 0.005163 * Math.sin(Dr - Mr)
      + 0.004987 * Math.sin(Dr + Mpr)
      + 0.004036 * Math.sin(2*Dr - Mpr + Mr);
    L = norm360(L);
    
    // Breite
    lat = 5.128122 * Math.sin(Fr)
        + 0.280602 * Math.sin(Mr + Fr)
        + 0.277693 * Math.sin(Mr - Fr)
        + 0.173237 * Math.sin(2*Dr - Fr)
        + 0.055413 * Math.sin(2*Dr - Mr + Fr)
        + 0.046271 * Math.sin(2*Dr - Mr - Fr)
        + 0.032573 * Math.sin(2*Dr + Fr)
        + 0.017198 * Math.sin(2*Mr + Fr)
        + 0.009266 * Math.sin(2*Dr + Mr - Fr)
        + 0.008822 * Math.sin(2*Mr - Fr);
    break;
    
   case 'mercury':
    // Merkur - Kepler-Elemente mit Störungen
    const Lm = 252.250906 + 149474.0722491 * T + 0.00030350 * T2;
    const am = 0.38709843;
    const em = 0.20563661 + 0.00002123 * T;
    const im = 7.004986 - 0.0059516 * T;
    const Wm = 48.33089 - 0.12536 * T;
    const wm = 77.45612 + 0.15940 * T;
    const Mm_m = Lm - wm;
    const Mmr = rad(Mm_m);
    // Keplergleichung (2 Iterationen)
    let Em = Mmr + em * Math.sin(Mmr);
    Em = Mmr + em * Math.sin(Em);
    const vm = 2 * Math.atan(Math.sqrt((1+em)/(1-em)) * Math.tan(Em/2));
    L = norm360(deg(vm) + wm);
    break;
    
   case 'venus':
    // Venus - präzisiert
    const Lv = 181.979801 + 58519.2130302 * T + 0.00031014 * T2;
    const ev = 0.00677672 - 0.00004778 * T;
    const wv = 131.56370 + 0.00220 * T;
    const Mv = Lv - wv;
    const Mvr = rad(Mv);
    let Ev = Mvr + ev * Math.sin(Mvr);
    Ev = Mvr + ev * Math.sin(Ev);
    const vv = 2 * Math.atan(Math.sqrt((1+ev)/(1-ev)) * Math.tan(Ev/2));
    L = norm360(deg(vv) + wv);
    break;
    
   case 'mars':
    // Mars - präzisiert mit mehr Termen
    const Lma = 355.433275 + 19141.6964471 * T + 0.00031052 * T2;
    const ema = 0.09340062 + 0.00009048 * T - 0.0000008 * T2;
    const wma = 336.06023 + 0.44369 * T - 0.00014 * T2;
    const Mma = Lma - wma;
    const Mmar = rad(Mma);
    let Ema = Mmar + ema * Math.sin(Mmar);
    Ema = Mmar + ema * Math.sin(Ema);
    Ema = Mmar + ema * Math.sin(Ema);
    const vma = 2 * Math.atan(Math.sqrt((1+ema)/(1-ema)) * Math.tan(Ema/2));
    L = norm360(deg(vma) + wma);
    break;
    
   case 'jupiter':
    // Jupiter - VSOP87 Hauptterme mit Saturn-Störung
    const Lj = 34.351519 + 3036.3027748 * T + 0.00022330 * T2;
    const ej = 0.04849793 + 0.000163255 * T - 0.0000004714 * T2;
    const wj = 14.33120 + 0.21490 * T + 0.00076 * T2;
    const Mj = Lj - wj;
    const Mjr = rad(Mj);
    // Saturn-Störung (große Ungleichheit)
    const Ms_j = 50.077444 + 1223.5110686 * T;
    const Sj = rad(Mj - Ms_j);
    let Ej = Mjr + ej * Math.sin(Mjr);
    Ej = Mjr + ej * Math.sin(Ej);
    const vj = 2 * Math.atan(Math.sqrt((1+ej)/(1-ej)) * Math.tan(Ej/2));
    // Störungsterme
    const pertJ = -0.332 * Math.sin(2*Sj) + 0.056 * Math.sin(2*Sj + Mjr) + 0.042 * Math.sin(3*Sj);
    L = norm360(deg(vj) + wj + pertJ);
    break;
    
   case 'saturn':
    // Saturn - mit Jupiter-Störung
    const Ls = 50.077444 + 1223.5110686 * T + 0.00020520 * T2;
    const es = 0.05550825 - 0.00034664 * T - 0.00000074 * T2;
    const ws = 93.05678 + 0.56654 * T + 0.00052 * T2;
    const Msat = Ls - ws;
    const Msr = rad(Msat);
    // Jupiter-Störung
    const Mj_s = 34.351519 + 3036.3027748 * T;
    const Ss = rad(Mj_s - Msat);
    let Es = Msr + es * Math.sin(Msr);
    Es = Msr + es * Math.sin(Es);
    const vs = 2 * Math.atan(Math.sqrt((1+es)/(1-es)) * Math.tan(Es/2));
    const pertS = 0.812 * Math.sin(2*Ss) - 0.229 * Math.cos(2*Ss) + 0.119 * Math.sin(3*Ss);
    L = norm360(deg(vs) + ws + pertS);
    break;
   
   case 'uranus':
    // Uranus - mit Störungen
    const Lu = 314.055005 + 429.8640561 * T + 0.00030390 * T2;
    const eu = 0.04629590 - 0.00002729 * T + 0.0000001 * T2;
    const wu = 173.00529 + 0.09266 * T - 0.00029 * T2;
    const Mu = Lu - wu;
    const Mur = rad(Mu);
    let Eu = Mur + eu * Math.sin(Mur);
    Eu = Mur + eu * Math.sin(Eu);
    const vu = 2 * Math.atan(Math.sqrt((1+eu)/(1-eu)) * Math.tan(Eu/2));
    L = norm360(deg(vu) + wu);
    break;
   
   case 'neptune':
    // Neptun
    const Ln = 304.348665 + 219.8833092 * T + 0.00030882 * T2;
    const en = 0.00898809 + 0.00000692 * T;
    const wn = 48.12027 + 0.01947 * T + 0.00009 * T2;
    const Mn = Ln - wn;
    const Mnr = rad(Mn);
    let En = Mnr + en * Math.sin(Mnr);
    En = Mnr + en * Math.sin(En);
    const vn = 2 * Math.atan(Math.sqrt((1+en)/(1-en)) * Math.tan(En/2));
    L = norm360(deg(vn) + wn);
    break;
   
   case 'pluto':
    // Pluto (formell kein Planet, astrologisch wichtig)
    // Vereinfachte Formel da sehr langsam
    const Lpl = 238.958 + 145.178 * T;
    const Mpl = 14.882 + 144.96 * T;
    const Mplr = rad(Mpl);
    L = norm360(Lpl + 6.65 * Math.sin(Mplr) + 1.28 * Math.sin(2*Mplr));
    break;
    
   default:
    L = 0;
  }
  
  return { longitude: norm360(L), latitude: lat };
 };
 
 // Ascendant berechnen (ekliptische Länge des aufgehenden Punktes)
 // Verbesserte Formel nach Jean Meeus
 const calcAscendant = (lst, latitude, eps) => {
  const lstRad = rad(lst);
  const latRad = rad(latitude);
  const epsRad = rad(eps);
  
  // Korrigierte Formel für den Aszendenten
  // Behandelt auch extreme Breitengrade besser
  const tanLat = Math.tan(latRad);
  const sinLST = Math.sin(lstRad);
  const cosLST = Math.cos(lstRad);
  const sinEps = Math.sin(epsRad);
  const cosEps = Math.cos(epsRad);
  
  const y = -cosLST;
  const x = sinLST * cosEps + tanLat * sinEps;
  
  let asc = deg(Math.atan2(y, x));
  
  // Korrektur für verschiedene Quadranten
  if (asc < 0) asc += 360;
  
  return norm360(asc);
 };
 
 // MC (Medium Coeli) - Präzisere Berechnung
 // Der MC ist der Schnittpunkt der Ekliptik mit dem Meridian
 const calcMC = (lst, eps) => {
  const lstRad = rad(lst);
  const epsRad = rad(eps);
  
  // RAMC (Right Ascension of Medium Coeli) = LST
  // MC in ekliptischer Länge
  let mc = deg(Math.atan2(Math.sin(lstRad), Math.cos(lstRad) * Math.cos(epsRad)));
  
  // Quadrantenkorrektur
  if (mc < 0) mc += 360;
  
  // Für LST > 180° muss MC um 180° korrigiert werden
  if (lst > 180 && mc < 180) mc += 180;
  else if (lst <= 180 && mc > 180) mc -= 180;
  
  return norm360(mc);
 };
 
 // Winkel-Differenz (kleinster Winkel zwischen zwei Positionen)
 const angleDiff = (a, b) => {
  let diff = Math.abs(norm360(a) - norm360(b));
  return diff > 180 ? 360 - diff : diff;
 };
 
 // Score berechnen: wie nah ist ein Planet an ASC/MC/IC/DSC?
 // Verwendung von astrologisch korrekten Orbs
 const calcPlanetScore = (planetLong, asc, mc) => {
  const ic = norm360(mc + 180);
  const dsc = norm360(asc + 180);
  
  // Nähe zu jedem Winkel
  const diffASC = angleDiff(planetLong, asc);
  const diffMC = angleDiff(planetLong, mc);
  const diffDSC = angleDiff(planetLong, dsc);
  const diffIC = angleDiff(planetLong, ic);
  
  // Bester Winkel (kleinste Differenz)
  const minDiff = Math.min(diffASC, diffMC, diffDSC, diffIC);
  
  // Welcher Winkel ist am nächsten?
  let angle = 'MC';
  let angleDesc = 'Karriere & Ruf';
  if (minDiff === diffASC) { angle = 'ASC'; angleDesc = 'Selbstausdruck & Ausstrahlung'; }
  else if (minDiff === diffDSC) { angle = 'DSC'; angleDesc = 'Beziehungen & Partner'; }
  else if (minDiff === diffIC) { angle = 'IC'; angleDesc = 'Heimat & innere Welt'; }
  
  // Score mit exponentieller Kurve für genauere Abstufung
  // 0° = 100, 5° = ~60, 10° = ~35, 15° = ~15, 20° = ~5, 25°+ = 0
  let score;
  if (minDiff <= 2) {
   // Sehr exakt (0-2°) - höchster Einfluss
   score = Math.round(100 - (minDiff * 5));
  } else if (minDiff <= 8) {
   // Stark (2-8°) - starker Einfluss  
   score = Math.round(90 - ((minDiff - 2) * 7));
  } else if (minDiff <= 15) {
   // Mittel (8-15°) - moderater Einfluss
   score = Math.round(48 - ((minDiff - 8) * 4));
  } else if (minDiff <= 25) {
   // Schwach (15-25°) - leichter Einfluss
   score = Math.round(20 - ((minDiff - 15) * 2));
  } else {
   // Kein merklicher Einfluss
   score = 0;
  }
  
  score = Math.max(0, Math.min(100, score));
  
  return { score, angle, angleDesc, diff: minDiff };
 };

 <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 sm:gap-4 mb-4 sm:mb-6">
 <div>
 <h2 className="text-base sm:text-lg md:text-xl font-bold text-white">{lang==='de'?'Deine Kraftorte':'Your Power Places'}</h2>
 <p className="text-purple-300 text-xs sm:text-sm">{lang==='de'?'Geboren:':'Born:'} {birthDate} {lang==='de'?'um':'at'} {birthTime} {lang==='de'?'in':'in'} {astroData.birthCity.name}</p>
 </div>
 <button onClick={()=>setAstroData(null)} className="px-4 py-2 bg-purple-500 bg-opacity-30 text-purple-300 text-xs sm:text-sm hover:bg-opacity-50">{lang==='de'?'Neu berechnen':'Recalculate'}</button>
 </div>
 
 {/* Beste Orte pro Planet */}
 <div className="space-y-3 sm:space-y-4">
 {astroData.planets.map((planet, i) => (
 <div key={i} className="bg-[#0a1a3a] border-2 border-opacity-50 p-4 md:p-5 overflow-hidden" style={{borderColor: planet.color, boxShadow: `0 0 20px ${planet.color}30`}}>
 <div className="flex items-center gap-3 md:gap-4 mb-4">
 <span className="text-4xl md:text-5xl" style={{color: planet.color}}>{planet.symbol}</span>
 <div>
 <h3 className="text-white text-lg md:text-xl font-bold">{planet.name}{lang==='de'?'-Linie':' Line'}</h3>
 <p className="text-gray-300 text-sm">{planet.simple}</p>
 </div>
 </div>
 
 <div className="bg-white bg-opacity-5 p-3 mb-4 border-l-4" style={{borderColor: planet.color}}>
 <p className="text-white text-sm"><strong style={{color: planet.color}}>{lang==='de'?'Das bedeutet:':'This means:'}</strong> {planet.forWhat}</p>
 <p className="text-gray-400 text-xs mt-1">{lang==='de'?'Ideal für:':'Ideal for:'} {planet.bestFor}</p>
 </div>
 
 <p className="text-purple-300 text-sm mb-3 font-bold">{lang==='de'?`Deine Top 5 Orte für ${planet.name}-Energie:`:`Your Top 5 Places for ${planet.name} Energy:`}</p>
 <div className="grid grid-cols-2 md:grid-cols-5 gap-2">
 {planet.bestCities.map((city, ci) => (
 <div key={ci} className={`p-2 md:p-3 text-center ${ci === 0 ? 'bg-yellow-500 bg-opacity-20 border-2 border-yellow-500' : ci === 1 ? 'bg-gray-400 bg-opacity-10 border border-gray-400' : ci === 2 ? 'bg-orange-700 bg-opacity-10 border border-orange-700' : 'bg-white bg-opacity-5 border border-gray-600'}`}>
 <div className="text-xl mb-1">{ci === 0 ? '🥇' : ci === 1 ? '🥈' : ci === 2 ? '🥉' : ci === 3 ? '4️⃣' : '5️⃣'}</div>
 <div className="text-white font-bold text-sm">{city.name}</div>
 <div className="text-gray-400 text-xs">{city.country}</div>
 <div className="mt-1 text-sm sm:text-base font-bold" style={{color: planet.color}}>{city.score}%</div>
 <div className="text-gray-500 text-xs">{city.angle} {city.diff}°</div>
 </div>
 ))}
 </div>
 </div>
 ))}
 </div>
 
 {/* NEU: Gesamtwertung - Top 10 Power Cities */}
 {astroData.topCities && (
 <div className="mt-6 bg-[#0a1a3a] border-2 border-purple-500 p-3 sm:p-4 md:p-6 overflow-hidden" style={{boxShadow: '0 0 30px rgba(168,85,247,0.2)'}}>
 <h3 className="text-white font-bold text-lg sm:text-xl mb-2 text-center">🌟 {lang==='de'?'DEINE TOP 10 POWER CITIES':'YOUR TOP 10 POWER CITIES'}</h3>
 <p className="text-purple-300 text-xs sm:text-sm text-center mb-4">{lang==='de'?'Gesamtwertung über alle Planeten':'Total score across all planets'}</p>
 
 <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2">
 {astroData.topCities.map((city, i) => (
  <div key={i} className={`p-2 sm:p-3 text-center ${i === 0 ? 'bg-gradient-to-b from-yellow-900 to-yellow-950 border-2 border-yellow-500' : i < 3 ? 'bg-purple-900 bg-opacity-50 border border-purple-400' : 'bg-white bg-opacity-5 border border-gray-600'}`}>
   <div className={`text-lg sm:text-xl mb-1 font-bold ${i === 0 ? 'text-yellow-400' : i < 3 ? 'text-purple-300' : 'text-purple-400'}`}>{i === 0 ? '👑' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}</div>
   <div className={`font-bold text-xs sm:text-sm ${i === 0 ? 'text-yellow-300' : 'text-white'}`}>{city.name}</div>
   <div className="text-gray-400 text-xs">{city.country}</div>
   <div className={`font-bold text-base sm:text-lg mt-1 ${i === 0 ? 'text-yellow-400' : 'text-purple-300'}`}>{city.totalScore}</div>
   <div className="text-gray-400 text-xs">{lang==='de'?'Punkte':'Points'}</div>
   {city.strongPlanets.length > 0 && (
    <div className="mt-1 sm:mt-2 text-xs">
     <div className="text-purple-300">{city.strongPlanets.length} {lang==='de'?'starke Linien':'strong lines'}</div>
     <div className="text-purple-400 truncate" title={city.strongPlanets.map(p=>p.symbol).join(' ')}>
      {city.strongPlanets.slice(0,3).map(p=>p.symbol).join(' ')}{city.strongPlanets.length > 3 ? '...' : ''}
     </div>
    </div>
   )}
  </div>
 ))}
 </div>
 
 <p className="text-gray-400 text-xs text-center mt-4">{lang==='de'
  ?'💡 Höhere Punktzahl = mehr starke Planetenlinien an diesem Ort'
  :'💡 Higher score = more strong planetary lines at this location'}</p>
 </div>
 )}
 
 {/* NEU: Sehr starke Einzellinien (<6°) */}
 {astroData.veryStrongCities && astroData.veryStrongCities.length > 0 && (
 <div className="mt-6 bg-[#0a1a3a] border-2 border-green-500 p-3 sm:p-4 md:p-6 overflow-hidden">
 <h3 className="text-green-400 font-bold text-base sm:text-lg mb-2">⭐ {lang==='de'?'SEHR STARKE PLANETENLINIEN':'VERY STRONG PLANETARY LINES'}</h3>
 <p className="text-gray-300 text-xs sm:text-sm mb-4">{lang==='de'
  ?'Diese Städte haben mindestens einen Planeten unter 6° Abstand zu einer Achse - das ist astrologisch sehr bedeutsam!'
  :'These cities have at least one planet within 6° of an axis - astrologically very significant!'}</p>
 
 <div className="space-y-2">
 {astroData.veryStrongCities.map((city, i) => (
  <div key={i} className="flex flex-col sm:flex-row sm:items-center sm:justify-between bg-white bg-opacity-5 p-2 sm:p-3 border-l-4 gap-2" style={{borderLeftColor: city.bestLine.color || '#a855f7'}}>
   <div className="flex items-center gap-2 sm:gap-3">
    <span className="text-xl sm:text-2xl" style={{color: city.bestLine.color || '#a855f7'}}>{city.bestLine.symbol}</span>
    <div>
     <span className="text-white font-bold text-sm sm:text-base">{city.name}</span>
     <span className="text-gray-400 text-xs sm:text-sm ml-2">{city.country}</span>
    </div>
   </div>
   <div className="text-left sm:text-right ml-8 sm:ml-0">
    <div className="font-bold text-sm" style={{color: city.bestLine.color || '#a855f7'}}>{city.bestLine.name} {city.bestLine.angle}</div>
    <div className="text-green-400 text-xs sm:text-sm font-bold">{city.bestLine.diff}° {lang==='de'?'Abstand':'distance'}</div>
   </div>
  </div>
 ))}
 </div>
 
 <p className="text-gray-500 text-xs mt-4">{lang==='de'
  ?'🎯 Je näher an 0°, desto stärker der Einfluss. Unter 2° = maximale Wirkung!'
  :'🎯 The closer to 0°, the stronger the influence. Under 2° = maximum effect!'}</p>
 </div>
 )}
 
 {/* Zusammenfassung */}
 <div className="mt-6 bg-purple-500 bg-opacity-10 border-2 border-purple-500 p-3 sm:p-4 md:p-6 overflow-hidden">
 <h3 className="text-purple-400 font-bold text-base sm:text-lg mb-4 text-center">{lang==='de'?'Deine Top-Empfehlungen':'Your Top Recommendations'}</h3>
 <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
 <div className="bg-white bg-opacity-5 p-3 sm:p-4">
 <h4 className="font-bold mb-2 text-sm sm:text-base" style={{color:'#FFD700'}}>☉ {lang==='de'?'Für Karriere & Erfolg':'For Career & Success'}</h4>
 <p className="text-white text-base sm:text-lg">{astroData.planets.find(p=>p.id==='sun').bestCities[0].name}</p>
 </div>
 <div className="bg-white bg-opacity-5 p-3 sm:p-4">
 <h4 className="font-bold mb-2 text-sm sm:text-base" style={{color:'#FF69B4'}}>♀ {lang==='de'?'Für Liebe & Beziehungen':'For Love & Relationships'}</h4>
 <p className="text-white text-base sm:text-lg">{astroData.planets.find(p=>p.id==='venus').bestCities[0].name}</p>
 </div>
 <div className="bg-white bg-opacity-5 p-3 sm:p-4">
 <h4 className="font-bold mb-2 text-sm sm:text-base" style={{color:'#C0C0C0'}}>☽ {lang==='de'?'Für Familie & Zuhause':'For Family & Home'}</h4>
 <p className="text-white text-base sm:text-lg">{astroData.planets.find(p=>p.id==='moon').bestCities[0].name}</p>
 </div>
 <div className="bg-white bg-opacity-5 p-3 sm:p-4">
 <h4 className="font-bold mb-2 text-sm sm:text-base" style={{color:'#9370DB'}}>♃ {lang==='de'?'Für Glück & Wachstum':'For Luck & Growth'}</h4>
 <p className="text-white text-base sm:text-lg">{astroData.planets.find(p=>p.id==='jupiter').bestCities[0].name}</p>
 </div>
 </div>
 </div>
 
 {/* Interpretationshilfe */}
 <div className="mt-6 bg-[#0a1a3a] border-2 border-purple-500 border-opacity-50 p-3 sm:p-4 md:p-6">
 <h3 className="text-purple-400 font-bold text-base sm:text-lg mb-4">{lang==='de'?'📖 Wie lese ich meine Ergebnisse?':'📖 How do I read my results?'}</h3>
 
 <div className="space-y-4 text-sm">
 <div>
 <h4 className="text-white font-bold mb-1">{lang==='de'?'Der Score (0-100%)':'The Score (0-100%)'}</h4>
 <p className="text-gray-300">{lang==='de'
  ?'Je höher der Score, desto näher steht der Planet an einer der 4 Achsen für diesen Ort. 90%+ bedeutet, der Planet steht fast exakt auf der Achse — maximaler Einfluss!'
  :'The higher the score, the closer the planet is to one of the 4 axes for that location. 90%+ means the planet is almost exactly on the axis — maximum influence!'}</p>
 <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-2">
  <div className="text-center p-2 bg-green-500 bg-opacity-20 border border-green-500"><span className="text-green-400 font-bold">90%+</span><br/><span className="text-xs text-gray-400">{lang==='de'?'Sehr stark':'Very strong'}</span></div>
  <div className="text-center p-2 bg-blue-500 bg-opacity-20 border border-blue-500"><span className="text-blue-400 font-bold">60-89%</span><br/><span className="text-xs text-gray-400">{lang==='de'?'Stark':'Strong'}</span></div>
  <div className="text-center p-2 bg-yellow-500 bg-opacity-20 border border-yellow-500"><span className="text-yellow-400 font-bold">30-59%</span><br/><span className="text-xs text-gray-400">{lang==='de'?'Moderat':'Moderate'}</span></div>
  <div className="text-center p-2 bg-gray-500 bg-opacity-20 border border-gray-500"><span className="text-gray-400 font-bold">0-29%</span><br/><span className="text-xs text-gray-400">{lang==='de'?'Schwach':'Weak'}</span></div>
 </div>
 </div>
 
 <div>
 <h4 className="text-white font-bold mb-1">{lang==='de'?'Praktische Anwendung':'Practical Application'}</h4>
 <ul className="text-gray-300 space-y-1">
  <li>• {lang==='de'?'Du musst nicht umziehen! Auch Urlaube, Geschäftsreisen oder Online-Verbindungen zu diesen Orten können die Energie aktivieren.':'You don\'t have to move! Vacations, business trips, or online connections to these places can also activate the energy.'}</li>
  <li>• {lang==='de'?'Achte auf Orte, die bei mehreren Planeten gut abschneiden — das sind deine "Power Spots".':'Look for places that score well for multiple planets — these are your "power spots".'}</li>
  <li>• {lang==='de'?'Niedrige Scores sind nicht schlecht — sie bedeuten nur, dass diese spezielle Energie dort neutraler ist.':'Low scores aren\'t bad — they just mean that specific energy is more neutral there.'}</li>
 </ul>
 </div>
 
 <div className="bg-purple-500 bg-opacity-10 p-3 border-l-4 border-purple-500">
 <p className="text-purple-300 italic">{lang==='de'
  ?'💡 Tipp: Die Kombination aus Sonne (Karriere) und Jupiter (Glück) zeigt Orte für beruflichen Erfolg. Venus und Mond zusammen sind ideal für Familiengründung.'
  :'💡 Tip: The combination of Sun (career) and Jupiter (luck) shows places for professional success. Venus and Moon together are ideal for starting a family.'}</p>
 </div>
 </div>
 </div>
 </>
 )}
 </div>
 </div></div>
 );
 }
